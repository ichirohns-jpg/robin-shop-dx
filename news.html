<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>お知らせ｜ろびんショップDX</title>

  <style>
    :root {
      --red: #b51f2a;
      --dark-red: #7d1018;
      --yellow: #f4c400;
      --charcoal: #202124;
      --cream: #fffaf0;
      --gray: #666;
      --line: #eadfca;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      color: var(--charcoal);
      background: var(--cream);
      font-family:
        -apple-system,
        BlinkMacSystemFont,
        "Hiragino Kaku Gothic ProN",
        "Yu Gothic",
        "Meiryo",
        sans-serif;
      line-height: 1.8;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    img {
      max-width: 100%;
      display: block;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(32, 33, 36, 0.97);
      color: #fff;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.15);
    }

    .header-inner {
      max-width: 1120px;
      margin: 0 auto;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 900;
      font-size: 1.2rem;
      white-space: nowrap;
    }

    .brand-mark {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      object-fit: cover;
      background: #fff;
    }

    nav {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 8px;
    }

    nav a {
      padding: 6px 10px;
      border-radius: 8px;
      color: #fff;
      font-size: 0.88rem;
    }

    nav a:hover,
    nav a.active {
      background: var(--red);
    }

    .hero {
      min-height: 270px;
      padding: 70px 20px;
      color: #fff;
      background:
        linear-gradient(rgba(32, 33, 36, 0.68), rgba(32, 33, 36, 0.76)),
        url("robin-main-banner.jpg") center / cover;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .hero-content {
      max-width: 820px;
    }

    .hero h1 {
      margin: 0 0 12px;
      font-size: clamp(2rem, 5vw, 3.5rem);
      letter-spacing: 0.08em;
    }

    .hero p {
      margin: 0;
      font-size: 1.05rem;
    }

    main {
      max-width: 1120px;
      margin: 0 auto;
      padding: 56px 20px 80px;
    }

    .section-title {
      margin: 0 0 10px;
      color: var(--dark-red);
      font-size: clamp(1.7rem, 4vw, 2.4rem);
      text-align: center;
    }

    .section-lead {
      margin: 0 auto 34px;
      color: var(--gray);
      text-align: center;
    }

    #news-list {
      display: grid;
      gap: 24px;
    }

    .news-card {
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: #fff;
      box-shadow: 0 8px 22px rgba(90, 55, 20, 0.08);
    }

    .news-image {
      width: 100%;
      max-height: 360px;
      object-fit: cover;
      background: #f3eee3;
    }

    .news-content {
      padding: 24px;
    }

    .news-date {
      display: inline-block;
      margin-bottom: 8px;
      padding: 3px 10px;
      border-radius: 999px;
      color: var(--dark-red);
      background: #fff1b8;
      font-size: 0.86rem;
      font-weight: 700;
    }

    .news-title {
      margin: 0 0 12px;
      color: var(--charcoal);
      font-size: 1.45rem;
      line-height: 1.45;
    }

    .news-body {
      margin: 0;
      color: #444;
      white-space: pre-line;
    }

    .news-link {
      display: inline-block;
      margin-top: 18px;
      padding: 10px 18px;
      border-radius: 999px;
      color: #fff;
      background: var(--red);
      font-weight: 700;
    }

    .news-link:hover {
      background: var(--dark-red);
    }

    .empty,
    .error {
      padding: 42px 20px;
      border: 1px dashed var(--line);
      border-radius: 16px;
      background: #fff;
      color: var(--gray);
      text-align: center;
    }

    .error {
      color: var(--dark-red);
      border-color: #e4a1a1;
      background: #fff5f5;
    }

    .loading {
      padding: 42px 20px;
      color: var(--gray);
      text-align: center;
    }

    .page-links {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-top: 54px;
    }

    .page-link {
      padding: 16px 10px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fff;
      text-align: center;
      font-weight: 700;
    }

    .page-link:hover {
      color: #fff;
      background: var(--red);
    }

    footer {
      padding: 34px 20px;
      color: #fff;
      background: var(--charcoal);
      text-align: center;
    }

    footer p {
      margin: 4px 0;
    }

    .to-top {
      display: inline-block;
      margin-top: 14px;
      color: var(--yellow);
      font-weight: 700;
    }

    @media (max-width: 760px) {
      .header-inner {
        align-items: flex-start;
        flex-direction: column;
      }

      nav {
        width: 100%;
        justify-content: flex-start;
      }

      nav a {
        padding: 5px 8px;
        font-size: 0.82rem;
      }

      .hero {
        min-height: 230px;
        padding: 54px 18px;
      }

      main {
        padding: 42px 16px 64px;
      }

      .news-content {
        padding: 20px;
      }

      .page-links {
        grid-template-columns: repeat(2, 1fr);
      }
    }
  </style>
</head>

<body id="top">

  <header>
    <div class="header-inner">
      <a class="brand" href="index.html">
        <img
          class="brand-mark"
          src="ロビンアイコン.jpg"
          alt="ろびんアイコン"
        >
        <span>ろびんショップDX</span>
      </a>

      <nav aria-label="メインメニュー">
        <a href="index.html">ホーム</a>
        <a href="menu.html">メニュー</a>
        <a href="news.html" class="active">お知らせ</a>
        <a href="access.html">店舗情報</a>
        <a href="voice.html">お客様の声</a>
      </nav>
    </div>
  </header>

  <section class="hero">
    <div class="hero-content">
      <h1>お知らせ</h1>
      <p>ろびんからの最新情報をお届けします。</p>
    </div>
  </section>

  <main>
    <h2 class="section-title">ろびんからのお知らせ</h2>
    <p class="section-lead">
      営業情報、メニュー情報、地域のお知らせなどを掲載します。
    </p>

    <section id="news-list" aria-live="polite">
      <div class="loading">お知らせを読み込んでいます。</div>
    </section>

    <div class="page-links">
      <a class="page-link" href="index.html">ホーム</a>
      <a class="page-link" href="menu.html">メニュー</a>
      <a class="page-link" href="access.html">店舗情報</a>
      <a class="page-link" href="voice.html">お客様の声</a>
    </div>
  </main>

  <footer>
    <p>ろびんショップDX</p>
    <p>埼玉県志木市の町中華・ラーメン店「ろびん」</p>
    <a class="to-top" href="#top">ページ上部へ戻る</a>
  </footer>

  <script>
    const GAS_URL =
      "https://script.google.com/macros/s/AKfycbxHyaWGMgx1Z_pj6aDBkWbWKcYZ8-Om-pxXxHH5C1lOvbJ2CP_uarqbjeiJYEorlv0Stg/exec";

    const FALLBACK_IMAGE = "robin-main.jpg";

    function escapeHTML(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function safeUrl(value) {
      const url = String(value ?? "").trim();

      if (!url) {
        return "";
      }

      if (/^https?:\/\//i.test(url)) {
        return url;
      }

      return "";
    }

    function convertDriveImageUrl(value) {
      const url = safeUrl(value);

      if (!url) {
        return "";
      }

      const fileMatch = url.match(
        /drive\.google\.com\/file\/d\/([^/]+)/
      );

      if (fileMatch) {
        return "https://drive.google.com/uc?export=view&id=" + fileMatch[1];
      }

      const idMatch = url.match(/[?&]id=([^&]+)/);

      if (
        idMatch &&
        url.includes("drive.google.com")
      ) {
        return "https://drive.google.com/uc?export=view&id=" + idMatch[1];
      }

      return url;
    }

    function isYouTubeUrl(url) {
      return /youtube\.com|youtu\.be/i.test(url);
    }

    function renderNews(items) {
      const list = document.getElementById("news-list");

      if (!Array.isArray(items) || items.length === 0) {
        list.innerHTML = `
          <div class="empty">
            現在、新しいお知らせはありません。
          </div>
        `;
        return;
      }

      list.innerHTML = items.map((item) => {
        const date = escapeHTML(item.date || "");
        const title = escapeHTML(item.title || "ろびんからのお知らせ");
        const body = escapeHTML(item.body || "");

        const rawImage =
          item.imageUrl ||
          item.image ||
          "";

        const imageUrl =
          convertDriveImageUrl(rawImage) ||
          FALLBACK_IMAGE;

        const linkUrl =
          safeUrl(item.externalLink || item.link || "");

        const imageHtml = imageUrl
          ? `
            <img
              class="news-image"
              src="${escapeHTML(imageUrl)}"
              alt="${title}"
              loading="lazy"
              onerror="this.src='${FALLBACK_IMAGE}'"
            >
          `
          : "";

        const linkHtml = linkUrl
          ? `
            <a
              class="news-link"
              href="${escapeHTML(linkUrl)}"
              target="_blank"
              rel="noopener noreferrer"
            >
              ${isYouTubeUrl(linkUrl) ? "動画を見る" : "詳しく見る"}
            </a>
          `
          : "";

        return `
          <article class="news-card">
            ${imageHtml}

            <div class="news-content">
              ${date ? `<div class="news-date">${date}</div>` : ""}

              <h3 class="news-title">${title}</h3>

              ${body ? `<p class="news-body">${body}</p>` : ""}

              ${linkHtml}
            </div>
          </article>
        `;
      }).join("");
    }

    async function loadNews() {
      const list = document.getElementById("news-list");

      try {
        const response = await fetch(
          GAS_URL + "?mode=news&t=" + Date.now(),
          {
            method: "GET",
            cache: "no-store"
          }
        );

        if (!response.ok) {
          throw new Error("通信エラー");
        }

        const data = await response.json();

        if (!data.ok) {
          throw new Error(data.error || "データ取得エラー");
        }

        renderNews(data.items || []);
      } catch (error) {
        console.error(error);

        list.innerHTML = `
          <div class="error">
            お知らせを読み込めませんでした。<br>
            しばらく時間をおいてから、もう一度お試しください。
          </div>
        `;
      }
    }

    document.addEventListener("DOMContentLoaded", loadNews);
  </script>

</body>
</html>
