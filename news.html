<script>

const menuButton =
  document.querySelector(".menu-button");

const mainNav =
  document.querySelector(".main-nav");

if(menuButton && mainNav){

  menuButton.addEventListener(
    "click",
    function(){

      const isOpen =
        mainNav.classList.toggle("open");

      menuButton.setAttribute(
        "aria-expanded",
        String(isOpen)
      );

      menuButton.textContent =
        isOpen ? "×" : "☰";

    }
  );

  document
    .querySelectorAll(".main-nav a")
    .forEach(
      function(link){

        link.addEventListener(
          "click",
          function(){

            mainNav.classList.remove("open");

            menuButton.setAttribute(
              "aria-expanded",
              "false"
            );

            menuButton.textContent =
              "☰";

          }
        );

      }
    );

}

const GAS_URL =
  "https://script.google.com/macros/s/AKfycbyQYbLdtiWhEr27ZAWJi3D98eVJdXlD-lMr2D6T6RxvfIb_k2kFHDxxfdKE_WTiUCZ1HQ/exec";

const FALLBACK_IMAGE =
  "robin-main.jpg";


function escapeHTML(value){

  return String(value || "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");

}


function safeUrl(value){

  const url =
    String(value || "").trim();

  return /^https?:\/\//i.test(url)
    ? url
    : "";

}


function convertDriveImageUrl(value){

  const url =
    safeUrl(value);

  if(!url){

    return "";

  }

  let fileId = "";

  const fileMatch =
    url.match(
      /drive\.google\.com\/file\/d\/([^/]+)/
    );

  if(fileMatch){

    fileId =
      fileMatch[1];

  }

  if(!fileId){

    const idMatch =
      url.match(
        /[?&]id=([^&#]+)/
      );

    if(idMatch){

      fileId =
        idMatch[1];

    }

  }

  if(!fileId){

    const googleusercontentMatch =
      url.match(
        /googleusercontent\.com\/d\/([^=/?]+)/
      );

    if(googleusercontentMatch){

      fileId =
        googleusercontentMatch[1];

    }

  }

  if(fileId){

    return(
      "https://lh3.googleusercontent.com/d/" +
      fileId +
      "=w1200"
    );

  }

  return url;

}


function getYouTubeEmbedUrl(url){

  const value =
    String(url || "").trim();

  if(!value){

    return "";

  }

  try{

    const parsed =
      new URL(value);

    const host =
      parsed.hostname.toLowerCase();

    let videoId =
      "";

    if(
      host === "youtu.be" ||
      host.endsWith(".youtu.be")
    ){

      videoId =
        parsed.pathname
          .replace(/^\/+/, "")
          .split("/")[0];

    }else if(
      host === "youtube.com" ||
      host.endsWith(".youtube.com")
    ){

      if(
        parsed.pathname === "/watch"
      ){

        videoId =
          parsed.searchParams.get("v") ||
          "";

      }else if(
        parsed.pathname.startsWith(
          "/shorts/"
        )
      ){

        videoId =
          parsed.pathname
            .split("/")[2] ||
            "";

      }else if(
        parsed.pathname.startsWith(
          "/embed/"
        )
      ){

        videoId =
          parsed.pathname
            .split("/")[2] ||
            "";

      }

    }

    if(
      !/^[A-Za-z0-9_-]{6,}$/.test(
        videoId
      )
    ){

      return "";

    }

    return(
      "https://www.youtube-nocookie.com/embed/" +
      videoId +
      "?rel=0"
    );

  }catch(error){

    return "";

  }

}


function createSharePageUrl(
  title,
  body,
  imageUrl,
  linkUrl
){

  const sharePage =
    new URL(
      "share-news.html",
      window.location.href
    );

  sharePage.searchParams.set(
    "title",
    title
  );

  if(body){

    sharePage.searchParams.set(
      "body",
      body
    );

  }

  if(imageUrl){

    sharePage.searchParams.set(
      "image",
      imageUrl
    );

  }

  if(linkUrl){

    sharePage.searchParams.set(
      "link",
      linkUrl
    );

  }

  return sharePage.toString();

}


function renderNews(items){

  const list =
    document.getElementById(
      "news-list"
    );

  if(
    !Array.isArray(items) ||
    items.length === 0
  ){

    list.innerHTML = `
      <div class="empty">
        現在、新しいお知らせはありません。
      </div>
    `;

    return;

  }

  list.innerHTML =
    items.map(
      item => {

        const rawTitle =
          String(
            item.title ||
            "ろびんからのお知らせ"
          );

        const rawBody =
          String(
            item.body ||
            ""
          );

        const date =
          escapeHTML(item.date);

        const title =
          escapeHTML(rawTitle);

        const body =
          escapeHTML(rawBody);

        const imageUrl =
          convertDriveImageUrl(
            item.imageUrl ||
            item.image ||
            ""
          );

        const linkUrl =
          safeUrl(
            item.externalLink ||
            item.link ||
            ""
          );

        const youtubeEmbedUrl =
          getYouTubeEmbedUrl(
            linkUrl
          );

        const shareUrl =
          createSharePageUrl(
            rawTitle,
            rawBody,
            imageUrl,
            linkUrl
          );

        const shareText =
          (
            rawTitle +
            " " +
            rawBody
          )
          .replace(/\s+/g, " ")
          .trim();

        const lineShareUrl =
          "https://line.me/R/msg/text/?" +
          encodeURIComponent(
            shareText +
            "\n" +
            shareUrl
          );

        const xShareUrl =
          "https://twitter.com/intent/tweet?text=" +
          encodeURIComponent(
            shareText
          ) +
          "&url=" +
          encodeURIComponent(
            shareUrl
          );

        const facebookShareUrl =
          "https://www.facebook.com/sharer/sharer.php?u=" +
          encodeURIComponent(
            shareUrl
          );

        const imageHtml =
          imageUrl
            ? `
              <img
                class="news-image"
                src="${escapeHTML(imageUrl)}"
                alt="${title}"
                loading="lazy"
                onerror="this.src='${FALLBACK_IMAGE}'"
              >
            `
            : "";

        const isShortVideo =
          /youtube\.com\/shorts\//i.test(
            linkUrl
          );

        const youtubeHtml =
          youtubeEmbedUrl
            ? `
              <div
                class="${
                  isShortVideo
                    ? "youtube-wrap youtube-short"
                    : "youtube-wrap"
                }"
              >
                <iframe
                  src="${escapeHTML(youtubeEmbedUrl)}"
                  title="${title}"
                  loading="lazy"
                  allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                  allowfullscreen
                ></iframe>
              </div>
            `
            : "";

        const linkHtml =
          !youtubeEmbedUrl && linkUrl
            ? `
              <a
                class="news-link"
                href="${escapeHTML(linkUrl)}"
                target="_blank"
                rel="noopener noreferrer"
              >
                詳しく見る
              </a>
            `
            : "";

        const shareHtml =
          `
            <div class="news-share">

              <p class="news-share-title">
                このお知らせを共有する
              </p>

              <div class="news-share-buttons">

                <a
                  class="share-button share-line"
                  href="${escapeHTML(lineShareUrl)}"
                  target="_blank"
                  rel="noopener noreferrer"
                >
                  LINE
                </a>

                <a
                  class="share-button share-x"
                  href="${escapeHTML(xShareUrl)}"
                  target="_blank"
                  rel="noopener noreferrer"
                >
                  X
                </a>

                <a
                  class="share-button share-facebook"
                  href="${escapeHTML(facebookShareUrl)}"
                  target="_blank"
                  rel="noopener noreferrer"
                >
                  Facebook
                </a>

                <button
                  class="share-button share-copy"
                  type="button"
                  data-share-url="${escapeHTML(shareUrl)}"
                >
                  リンクをコピー
                </button>

              </div>

            </div>
          `;

        return `
          <article class="news-card">

            ${imageHtml}

            ${youtubeHtml}

            <div class="news-content">

              <div class="news-date">
                ${date}
              </div>

              <h3 class="news-title">
                ${title}
              </h3>

              ${
                body
                  ? `
                    <p class="news-body">
                      ${body}
                    </p>
                  `
                  : ""
              }

              ${linkHtml}

              ${shareHtml}

            </div>

          </article>
        `;

      }
    ).join("");

}


async function loadNews(){

  const list =
    document.getElementById(
      "news-list"
    );

  try{

    const response =
      await fetch(
        GAS_URL +
        "?mode=news&t=" +
        Date.now(),
        {
          method:"GET",
          cache:"no-store"
        }
      );

    const data =
      await response.json();

    if(!data.ok){

      throw new Error(
        data.error ||
        "お知らせ取得エラー"
      );

    }

    renderNews(
      data.items || []
    );

  }catch(error){

    console.error(error);

    list.innerHTML = `
      <div class="error">
        お知らせを読み込めませんでした。
      </div>
    `;

  }

}


document.addEventListener(
  "click",
  async function(event){

    const button =
      event.target.closest(
        ".share-copy"
      );

    if(!button){

      return;

    }

    const url =
      button.dataset.shareUrl ||
      window.location.href;

    try{

      await navigator.clipboard.writeText(
        url
      );

      const originalText =
        button.textContent;

      button.textContent =
        "コピーしました";

      setTimeout(
        function(){

          button.textContent =
            originalText;

        },
        1600
      );

    }catch(error){

      window.prompt(
        "下のリンクをコピーしてください。",
        url
      );

    }

  }
);


document.addEventListener(
  "DOMContentLoaded",
  loadNews
);

</script>

</body>
</html>
