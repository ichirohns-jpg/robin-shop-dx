<style>

:root{
  --water:#2c8c98;
  --water-light:#e8f7f5;
  --water-pale:#f5fbfa;

  --green:#6b9e62;
  --green-dark:#356d57;

  --gold-light:#fff6d9;

  --text:#294944;
  --muted:#6b7d78;
  --line:#d5e7e1;
  --white:#ffffff;

}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html{
  scroll-behavior:smooth;
}

body{
  color:var(--text);
  background:

    );
  font-family:

    "Hiragino Sans",
    "Yu Gothic",
    "Meiryo",
    sans-serif;

}

a{

  text-decoration:none;
}

img{
  display:block;
  max-width:100%;
}

button{
  font:inherit;
}

/* ヘッダー */

.site-header{
  position:sticky;
  top:0;
  z-index:1000;
  width:min(100%,760px);
  margin:0 auto;
  background:#ffffff;
  border-bottom:3px solid var(--green);
  box-shadow:0 3px 12px rgba(55,112,105,.1);
}

.header-inner{
  min-height:70px;
  padding:
    calc(8px + env(safe-area-inset-top))
    14px
    8px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
}

.brand{
  display:flex;
  align-items:center;
  gap:10px;
  color:var(--text);
  font-weight:900;
}

.brand-mark{
  width:48px;
  height:48px;
  object-fit:cover;
  border:2px solid var(--gold);
  border-radius:50%;
}

.brand-text{
  line-height:1.15;
}

.brand-text strong{
  display:block;
  color:var(--text);
  font-size:20px;
  letter-spacing:.04em;
}

.brand-text small{
  display:block;
  margin-top:4px;
  color:var(--green-dark);
  font-size:10px;
  font-weight:800;
  letter-spacing:.08em;
}

.menu-button{
  width:44px;
  height:42px;
  display:flex;
  align-items:center;
  justify-content:center;
  color:var(--text);
  background:var(--gold-light);
  border:2px solid var(--gold);
  border-radius:12px;
  font-size:23px;
  font-weight:900;
}

.main-nav{
  position:absolute;
  top:100%;
  left:0;
  right:0;
  display:none;
  padding:10px 14px 14px;
  background:#ffffff;
  border-bottom:2px solid var(--line);
}

.main-nav.open{
  display:grid;
  gap:6px;
}

.main-nav a{
  padding:11px 12px;
  color:var(--text);
  background:var(--water-pale);
  border-radius:10px;
  font-size:15px;
  font-weight:900;
  text-align:center;
}

.main-nav a.active{
  color:#ffffff;
  background:var(--water);
}

/* メイン */

main{
  width:min(100%,760px);
  margin:0 auto;
  background:#ffffff;
}

/* ページタイトル */

.hero{
  padding:16px 14px 25px;
  background:#ffffff;
}

.hero-image{
  width:100%;
  height:190px;
  border-radius:20px;
  background:
    url("robin-main-banner.jpg")
    center
    / cover
    no-repeat;
}

.hero-content{
  padding:18px 5px 0;
}

.hero-kicker{
  display:inline-block;
  margin-bottom:7px;
  padding:4px 10px;
  color:var(--green-dark);
  background:var(--green-light);
  border-left:4px solid var(--gold);
  border-radius:4px;
  font-size:13px;
  font-weight:900;
}

.hero h1{

  line-height:1.25;

}

.hero p{

}

/* お知らせ */

.news-section{

  background:var(--water-pale);

.section-eyebrow{

  font-size:13px;

  letter-spacing:.18em;

}

.section-title{

  line-height:1.3;
  text-align:center;
}

  width:70px;
  height:4px;

  border-radius:10px;

      90deg,

  color:var(--muted);
  font-size:16px;
  text-align:center;
}

#news-list{
  display:grid;
  gap:16px;
}

.news-card{
  overflow:hidden;
  border:1px solid var(--line);
  border-left:6px solid var(--water);
  border-radius:17px;
  background:#ffffff;
  box-shadow:var(--shadow);
}

.news-image{
  width:100%;
  max-height:320px;
  object-fit:cover;
  background:var(--water-light);
}

.news-content{
  padding:20px 18px;
}

.news-date{
  display:inline-block;
  margin-bottom:9px;
  padding:4px 11px;
  color:var(--green-dark);
  background:var(--green-light);
  border-radius:999px;
  font-size:13px;
  font-weight:900;
}

.news-title{
  margin-bottom:10px;
  color:var(--green-dark);
  font-size:22px;
  line-height:1.45;
}

.news-body{
  color:var(--text);
  font-size:16px;
  white-space:pre-line;
}

.news-link{
  display:inline-flex;
  min-height:46px;
  margin-top:16px;
  padding:10px 18px;
  align-items:center;
  justify-content:center;
  color:#ffffff;
  background:var(--water);
  border-radius:999px;
  font-size:15px;
  font-weight:900;
}

.news-link:hover{
  background:var(--green);
}

.empty,
.error,
.loading{
  padding:38px 18px;
  border:1px solid var(--line);
  border-radius:17px;
  color:var(--muted);
  background:#ffffff;
  text-align:center;
  box-shadow:var(--shadow);
}

.error{
  color:#8a3030;
  background:#fff5f5;
}

/* ページリンク */

.page-links{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  margin-top:28px;
}

.page-link{
  min-height:52px;
  padding:12px 8px;
  display:flex;
  align-items:center;
  justify-content:center;

  background:#ffffff;
  border:1px solid var(--line);
  border-radius:14px;
  font-size:14px;
  font-weight:900;
  text-align:center;
}

.page-link.active{

  border-color:var(--water);
}

/* フッター */

.site-footer{
  width:min(100%,760px);
  margin:0 auto;
  padding:
    30px 16px
    calc(30px + env(safe-area-inset-bottom));
  color:var(--text);
  background:#e8f5ef;
  border-top:4px solid var(--green);

}

.footer-brand{

  align-items:center;
  justify-content:center;

}

.footer-brand img{

  height:55px;
  object-fit:cover;
  border:2px solid var(--gold);
  border-radius:50%;
}

.footer-brand strong{
  display:block;
  color:var(--green-dark);
  font-size:22px;
  line-height:1.2;
}

.footer-brand small{
  display:block;
  margin-top:3px;
  color:var(--muted);
  font-size:11px;
}

.footer-links{
  margin-top:16px;
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:12px;
  color:var(--green-dark);
  font-size:14px;
  font-weight:800;
}

.copyright{
  margin-top:18px;
  padding-top:12px;
  border-top:1px solid var(--line);
  color:var(--muted);
  font-size:12px;
}

.to-top{
  display:inline-block;
  margin-top:15px;
  color:var(--water);
  font-size:14px;
  font-weight:900;
}

/* パソコン */

@media(min-width:700px){

  .menu-button{
    display:none;
  }

  .main-nav{
    position:static;
    display:flex;
    gap:4px;
    padding:0;
    border:0;
    background:transparent;
  }

  .main-nav a{
    padding:8px 10px;
    background:transparent;
    font-size:13px;
  }

  .page-links{
    grid-template-columns:repeat(4,1fr);

}

/* スマートフォン */

@media(max-width:699px){

  .main-nav{
    position:absolute;
    top:100%;
    left:0;
    right:0;
  }

  .main-nav.open{
    display:grid;
  }

}

@media(max-width:430px){

  .brand-text strong{
    font-size:18px;
  }

  .brand-text small{

  }

  .hero-image{

  }

  .hero h1{
    font-size:34px;
  }

  .news-section{
    padding:44px 14px 65px;
  }

  .news-content{
    padding:18px 15px;
  }

  .news-title{
    font-size:20px;
  }

}

<script>

const menuButton =
  document.querySelector(".menu-button");

const mainNav =
  document.querySelector(".main-nav");

if(menuButton && mainNav){

  menuButton.addEventListener(
    "click",
    function(){

      const isOpen =
        mainNav.classList.toggle("open");

      menuButton.setAttribute(
        "aria-expanded",
        String(isOpen)
      );

      menuButton.textContent =
        isOpen ? "×" : "☰";

    }
  );

  document
    .querySelectorAll(".main-nav a")
    .forEach(
      function(link){

        link.addEventListener(
          "click",
          function(){

            mainNav.classList.remove("open");

            menuButton.setAttribute(
              "aria-expanded",
              "false"
            );

            menuButton.textContent =
              "☰";

          }
        );

      }
    );

}

const GAS_URL =
  "https://script.google.com/macros/s/AKfycbyQYbLdtiWhEr27ZAWJi3D98eVJdXlD-lMr2D6T6RxvfIb_k2kFHDxxfdKE_WTiUCZ1HQ/exec";

const FALLBACK_IMAGE =
  "robin-main.jpg";


function escapeHTML(value){

  return String(value || "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");

}


function safeUrl(value){

  const url =
    String(value || "").trim();

  return /^https?:\/\//i.test(url)
    ? url
    : "";

}


function convertDriveImageUrl(value){

  const url =
    safeUrl(value);

  if(!url){

    return "";

  }

  let fileId = "";

  const fileMatch =
    url.match(
      /drive\.google\.com\/file\/d\/([^/]+)/
    );

  if(fileMatch){

    fileId =
      fileMatch[1];

  }

  if(!fileId){

    const idMatch =
      url.match(
        /[?&]id=([^&#]+)/
      );

    if(idMatch){

      fileId =
        idMatch[1];

    }

  }

  if(!fileId){

    const googleusercontentMatch =
      url.match(
        /googleusercontent\.com\/d\/([^=/?]+)/
      );

    if(googleusercontentMatch){

      fileId =
        googleusercontentMatch[1];

    }

  }

  if(fileId){

    return(
      "https://lh3.googleusercontent.com/d/" +
      fileId +
      "=w1200"
    );

  }

  return url;

}


function isYouTubeUrl(url){

  return /youtube\.com|youtu\.be/i.test(
    url
  );

}


function renderNews(items){

  const list =
    document.getElementById(
      "news-list"
    );

  if(
    !Array.isArray(items) ||
    items.length === 0
  ){

    list.innerHTML = `
      <div class="empty">
        現在、新しいお知らせはありません。
      </div>
    `;

    return;

  }

  list.innerHTML =
    items.map(
      item => {

        const date =
          escapeHTML(item.date);

        const title =
          escapeHTML(
            item.title ||
            "ろびんからのお知らせ"
          );

        const body =
          escapeHTML(item.body);

        const imageUrl =
          convertDriveImageUrl(
            item.imageUrl ||
            item.image ||
            ""
          );

        const linkUrl =
          safeUrl(
            item.externalLink ||
            item.link ||
            ""
          );

        const imageHtml =
          imageUrl
            ? `
              <img
                class="news-image"
                src="${escapeHTML(imageUrl)}"
                alt="${title}"
                loading="lazy"
                onerror="this.src='${FALLBACK_IMAGE}'"
              >
            `
            : "";

        const linkHtml =
          linkUrl
            ? `
              <a
                class="news-link"
                href="${escapeHTML(linkUrl)}"
                target="_blank"
                rel="noopener noreferrer"
              >
                ${
                  isYouTubeUrl(linkUrl)
                    ? "動画を見る"
                    : "詳しく見る"
                }
              </a>
            `
            : "";

        return `
          <article class="news-card">

            ${imageHtml}

            <div class="news-content">

              <div class="news-date">
                ${date}
              </div>

              <h3 class="news-title">
                ${title}
              </h3>

              ${
                body
                  ? `
                    <p class="news-body">
                      ${body}
                    </p>
                  `
                  : ""
              }

              ${linkHtml}

            </div>

          </article>
        `;

      }
    ).join("");

}


async function loadNews(){

  const list =
    document.getElementById(
      "news-list"
    );

  try{

    const response =
      await fetch(
        GAS_URL +
        "?mode=news&t=" +
        Date.now(),
        {
          method:"GET",
          cache:"no-store"
        }
      );

    const data =
      await response.json();

    if(!data.ok){

      throw new Error(
        data.error ||
        "お知らせ取得エラー"
      );

    }

    renderNews(
      data.items || []
    );

  }catch(error){

    console.error(error);

    list.innerHTML = `
      <div class="error">
        お知らせを読み込めませんでした。
      </div>
    `;

  }

}


document.addEventListener(
  "DOMContentLoaded",
  loadNews
);

</script>
