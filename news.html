<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>お知らせ｜ろびんショップDX</title>

  <meta
    name="description"
    content="志木市の水と緑のまちにある町中華「ろびん」からのお知らせです。"
  >

  <meta name="theme-color" content="#075366">

  <link
    rel="icon"
    type="image/jpeg"
    href="robin-icon.jpg"
  >

  <link
    rel="apple-touch-icon"
    href="robin-icon.jpg"
  >

  <meta property="og:type" content="website">

  <meta
    property="og:title"
    content="お知らせ｜ろびんショップDX"
  >

  <meta
    property="og:description"
    content="志木市の水と緑のまちにある町中華「ろびん」からのお知らせです。"
  >

  <meta
    property="og:url"
    content="https://ichirohns-jpg.github.io/robin-shop-dx/news.html"
  >

  <meta
    property="og:image"
    content="https://ichirohns-jpg.github.io/robin-shop-dx/robin-main-banner.jpg"
  >

  <meta property="og:image:type" content="image/jpeg">

  <meta
    name="twitter:card"
    content="summary_large_image"
  >

  <meta
    name="twitter:title"
    content="お知らせ｜ろびんショップDX"
  >

  <meta
    name="twitter:description"
    content="ろびんからの最新情報をお届けします。"
  >

  <meta
    name="twitter:image"
    content="https://ichirohns-jpg.github.io/robin-shop-dx/robin-main-banner.jpg"
  >

  <style>

    :root{
      --water-deep:#075366;
      --water:#16849a;
      --water-light:#dff2f0;
      --water-pale:#f0faf8;

      --green-deep:#1d513d;
      --green:#3e8055;
      --green-light:#e6f1df;

      --leaf:#7fa84e;
      --gold:#d6a73a;

      --ink:#17343b;
      --muted:#617477;
      --white:#fff;
      --line:#cfe1dc;

      --shadow:0 12px 30px rgba(19,74,76,.14);
    }

    *{
      box-sizing:border-box;
    }

    html{
      scroll-behavior:smooth;
    }

    body{
      margin:0;
      color:var(--ink);
      background:var(--water-pale);
      font-family:
        -apple-system,
        BlinkMacSystemFont,
        "Hiragino Kaku Gothic ProN",
        "Yu Gothic",
        "Meiryo",
        sans-serif;
      line-height:1.8;
    }

    a{
      color:inherit;
      text-decoration:none;
    }

    img{
      max-width:100%;
      display:block;
    }

    /* ヘッダー */

    header{
      position:sticky;
      top:0;
      z-index:20;
      color:#fff;
      background:rgba(7,83,102,.97);
      border-bottom:4px solid var(--leaf);
      box-shadow:0 3px 16px rgba(0,0,0,.18);
    }

    .header-inner{
      max-width:1160px;
      margin:0 auto;
      padding:12px 20px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:18px;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:10px;
      color:#fff;
      font-size:1.2rem;
      font-weight:900;
      white-space:nowrap;
    }

    .brand-mark{
      width:42px;
      height:42px;
      border-radius:50%;
      object-fit:cover;
      background:#fff;
      border:2px solid var(--gold);
    }

    nav{
      display:flex;
      flex-wrap:wrap;
      justify-content:flex-end;
      gap:7px;
    }

    nav a{
      padding:7px 11px;
      border-radius:8px;
      color:#fff;
      font-size:.86rem;
      font-weight:800;
    }

    nav a:hover,
    nav a.active{
      background:var(--green);
    }

    /* ページタイトル */

    .hero{
      position:relative;
      min-height:360px;
      padding:78px 20px 112px;
      overflow:hidden;
      color:#fff;
      background:
        linear-gradient(
          rgba(4,54,66,.55),
          rgba(4,54,66,.88)
        ),
        url("robin-main-banner.jpg") center / cover;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
    }

    .hero::before{
      content:"";
      position:absolute;
      left:-8%;
      right:-8%;
      bottom:-78px;
      height:150px;
      border-radius:50% 50% 0 0;
      background:var(--water-pale);
      transform:rotate(-2deg);
    }

    .hero::after{
      content:"";
      position:absolute;
      left:0;
      right:0;
      bottom:55px;
      height:2px;
      background:rgba(255,255,255,.4);
      box-shadow:
        0 12px 0 rgba(255,255,255,.2),
        0 24px 0 rgba(255,255,255,.12);
    }

    .hero-content{
      position:relative;
      z-index:2;
      max-width:820px;
    }

    .hero-kicker{
      display:inline-block;
      margin:0 0 15px;
      padding:6px 17px;
      border:1px solid rgba(255,255,255,.65);
      border-radius:999px;
      color:#fff;
      background:rgba(7,83,102,.55);
      font-size:.9rem;
      font-weight:900;
      letter-spacing:.13em;
    }

    .hero h1{
      margin:0 0 14px;
      color:#fff;
      font-size:clamp(2.5rem,7vw,5rem);
      letter-spacing:.1em;
      text-shadow:
        0 4px 15px rgba(0,0,0,.5),
        3px 3px 0 rgba(29,81,61,.85);
    }

    .hero p{
      margin:0;
      color:#e0f1ed;
      font-size:1.05rem;
      font-weight:700;
    }

    /* 本文 */

    main{
      max-width:1120px;
      margin:0 auto;
      padding:64px 20px 84px;
    }

    .section-eyebrow{
      margin:0 0 5px;
      color:var(--water);
      font-size:.86rem;
      font-weight:900;
      letter-spacing:.2em;
      text-align:center;
    }

    .section-title{
      margin:0 0 12px;
      color:var(--green-deep);
      font-size:clamp(1.8rem,4.5vw,2.8rem);
      text-align:center;
    }

    .section-title::after{
      content:"";
      display:block;
      width:76px;
      height:4px;
      margin:13px auto 0;
      border-radius:10px;
      background:
        linear-gradient(
          90deg,
          var(--water),
          var(--leaf)
        );
    }

    .section-lead{
      max-width:780px;
      margin:0 auto 38px;
      color:var(--muted);
      text-align:center;
    }

    #news-list{
      display:grid;
      gap:24px;
    }

    .news-card{
      overflow:hidden;
      border:1px solid var(--line);
      border-top:7px solid var(--water);
      border-radius:20px;
      background:#fff;
      box-shadow:var(--shadow);
    }

    .news-image{
      width:100%;
      max-height:380px;
      object-fit:cover;
      background:var(--water-light);
    }

    .news-content{
      padding:26px;
    }

    .news-date{
      display:inline-block;
      margin-bottom:10px;
      padding:4px 12px;
      border-radius:999px;
      color:#fff;
      background:var(--green);
      font-size:.86rem;
      font-weight:800;
    }

    .news-title{
      margin:0 0 13px;
      color:var(--green-deep);
      font-size:1.5rem;
      line-height:1.45;
    }

    .news-body{
      margin:0;
      color:#45605c;
      white-space:pre-line;
    }

    .news-link{
      display:inline-block;
      margin-top:19px;
      padding:10px 20px;
      border-radius:999px;
      color:#fff;
      background:var(--water-deep);
      font-weight:800;
      transition:.2s;
    }

    .news-link:hover{
      background:var(--green-deep);
      transform:translateY(-2px);
    }

    .empty,
    .error,
    .loading{
      padding:45px 20px;
      border:1px solid var(--line);
      border-radius:18px;
      color:var(--muted);
      background:#fff;
      text-align:center;
      box-shadow:0 8px 20px rgba(19,74,76,.08);
    }

    .error{
      color:#8a3030;
      background:#fff5f5;
    }

    /* ページリンク */

    .page-links{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:14px;
      margin-top:56px;
    }

    .page-link{
      padding:17px 10px;
      border:1px solid var(--water);
      border-radius:15px;
      color:#fff;
      background:var(--water-deep);
      text-align:center;
      font-weight:900;
      box-shadow:0 6px 14px rgba(7,83,102,.12);
      transition:.2s;
    }

    .page-link:hover{
      background:var(--green);
      transform:translateY(-2px);
    }

    /* フッター */

    footer{
      padding:40px 20px;
      color:#fff;
      background:
        linear-gradient(
          135deg,
          var(--water-deep),
          #123e4c
        );
      border-top:5px solid var(--leaf);
      text-align:center;
    }

    footer p{
      margin:5px 0;
    }

    .to-top{
      display:inline-block;
      margin-top:15px;
      color:#e5c261;
      font-weight:900;
    }

    /* スマートフォン */

    @media(max-width:760px){

      .header-inner{
        align-items:flex-start;
        flex-direction:column;
      }

      nav{
        width:100%;
        justify-content:flex-start;
      }

      nav a{
        padding:6px 9px;
        font-size:.82rem;
      }

      .hero{
        min-height:300px;
        padding:62px 18px 105px;
      }

      .hero::after{
        bottom:48px;
      }

      main{
        padding:48px 16px 65px;
      }

      .news-content{
        padding:21px;
      }

      .news-title{
        font-size:1.3rem;
      }

      .page-links{
        grid-template-columns:repeat(2,1fr);
        gap:10px;
      }

      .page-link{
        padding:15px 8px;
        font-size:.92rem;
      }

    }

  </style>
</head>

<body id="top">

  <header>

    <div class="header-inner">

      <a class="brand" href="index.html">

        <img
          class="brand-mark"
          src="robin-icon.jpg"
          alt="ろびんアイコン"
        >

        <span>
          ろびんショップDX
        </span>

      </a>

      <nav>

        <a href="index.html">
          ホーム
        </a>

        <a href="menu.html">
          メニュー
        </a>

        <a class="active" href="news.html">
          お知らせ
        </a>

        <a href="access.html">
          店舗情報
        </a>

        <a href="voice.html">
          お客様の声
        </a>

      </nav>

    </div>

  </header>

  <section class="hero">

    <div class="hero-content">

      <p class="hero-kicker">
        ROBIN NEWS
      </p>

      <h1>
        お知らせ
      </h1>

      <p>
        水と緑のまち志木にある、ろびんからの最新情報をお届けします。
      </p>

    </div>

  </section>

  <main>

    <p class="section-eyebrow">
      INFORMATION
    </p>

    <h2 class="section-title">
      ろびんからのお知らせ
    </h2>

    <p class="section-lead">
      営業情報、メニュー情報、地域のお知らせなどを掲載します。
    </p>

    <section
      id="news-list"
      aria-live="polite"
    >

      <div class="loading">
        お知らせを読み込んでいます。
      </div>

    </section>

    <div class="page-links">

      <a class="page-link" href="index.html">
        ホーム
      </a>

      <a class="page-link" href="menu.html">
        メニュー
      </a>

      <a class="page-link" href="access.html">
        店舗情報
      </a>

      <a class="page-link" href="voice.html">
        お客様の声
      </a>

    </div>

  </main>

  <footer>

    <p>
      ろびんショップDX
    </p>

    <p>
      埼玉県志木市の水と緑のまちにある町中華「ろびん」
    </p>

    <a class="to-top" href="#top">
      ページ上部へ戻る
    </a>

  </footer>

  <script>

    const GAS_URL =
      "https://script.google.com/macros/s/AKfycbyQYbLdtiWhEr27ZAWJi3D98eVJdXlD-lMr2D6T6RxvfIb_k2kFHDxxfdKE_WTiUCZ1HQ/exec";

    const FALLBACK_IMAGE =
      "robin-main.jpg";


    function escapeHTML(value){

      return String(value || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");

    }


    function safeUrl(value){

      const url =
        String(value || "").trim();

      return /^https?:\/\//i.test(url)
        ? url
        : "";

    }


    function convertDriveImageUrl(value){

      const url =
        safeUrl(value);

      if(!url){

        return "";

      }

      let fileId = "";

      const fileMatch =
        url.match(
          /drive\.google\.com\/file\/d\/([^/]+)/
        );

      if(fileMatch){

        fileId =
          fileMatch[1];

      }

      if(!fileId){

        const idMatch =
          url.match(
            /[?&]id=([^&#]+)/
          );

        if(idMatch){

          fileId =
            idMatch[1];

        }

      }

      if(!fileId){

        const googleusercontentMatch =
          url.match(
            /googleusercontent\.com\/d\/([^=/?]+)/
          );

        if(googleusercontentMatch){

          fileId =
            googleusercontentMatch[1];

        }

      }

      if(fileId){

        return(
          "https://lh3.googleusercontent.com/d/" +
          fileId +
          "=w1200"
        );

      }

      return url;

    }


    function isYouTubeUrl(url){

      return /youtube\.com|youtu\.be/i.test(
        url
      );

    }


    function renderNews(items){

      const list =
        document.getElementById(
          "news-list"
        );

      if(
        !Array.isArray(items) ||
        items.length === 0
      ){

        list.innerHTML = `
          <div class="empty">
            現在、新しいお知らせはありません。
          </div>
        `;

        return;

      }

      list.innerHTML =
        items.map(
          item => {

            const date =
              escapeHTML(item.date);

            const title =
              escapeHTML(
                item.title ||
                "ろびんからのお知らせ"
              );

            const body =
              escapeHTML(item.body);

            const imageUrl =
              convertDriveImageUrl(
                item.imageUrl ||
                item.image ||
                ""
              );

            const linkUrl =
              safeUrl(
                item.externalLink ||
                item.link ||
                ""
              );

            const imageHtml =
              imageUrl
                ? `
                  <img
                    class="news-image"
                    src="${escapeHTML(imageUrl)}"
                    alt="${title}"
                    loading="lazy"
                    onerror="this.src='${FALLBACK_IMAGE}'"
                  >
                `
                : "";

            const linkHtml =
              linkUrl
                ? `
                  <a
                    class="news-link"
                    href="${escapeHTML(linkUrl)}"
                    target="_blank"
                    rel="noopener noreferrer"
                  >
                    ${
                      isYouTubeUrl(linkUrl)
                        ? "動画を見る"
                        : "詳しく見る"
                    }
                  </a>
                `
                : "";

            return `
              <article class="news-card">

                ${imageHtml}

                <div class="news-content">

                  <div class="news-date">
                    ${date}
                  </div>

                  <h3 class="news-title">
                    ${title}
                  </h3>

                  ${
                    body
                      ? `
                        <p class="news-body">
                          ${body}
                        </p>
                      `
                      : ""
                  }

                  ${linkHtml}

                </div>

              </article>
            `;

          }
        ).join("");

    }


    async function loadNews(){

      const list =
        document.getElementById(
          "news-list"
        );

      try{

        const response =
          await fetch(
            GAS_URL +
            "?mode=news&t=" +
            Date.now(),
            {
              method:"GET",
              cache:"no-store"
            }
          );

        const data =
          await response.json();

        if(!data.ok){

          throw new Error(
            data.error ||
            "お知らせ取得エラー"
          );

        }

        renderNews(
          data.items || []
        );

      }catch(error){

        console.error(error);

        list.innerHTML = `
          <div class="error">
            お知らせを読み込めませんでした。
          </div>
        `;

      }

    }


    document.addEventListener(
      "DOMContentLoaded",
      loadNews
    );

  </script>

</body>
</html>
