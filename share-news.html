<style>

:root{
  --red:#c63743;
  --red-dark:#9f2935;
  --yellow:#e7bf5b;
  --yellow-light:#fff8df;

  --water:#2996a4;
  --water-light:#eaf7f6;

  --green:#6d9e62;
  --green-dark:#356d57;
  --green-light:#edf6e9;

  --text:#294944;
  --muted:#6b7d78;
  --line:#d5e7e1;

  --shadow:0 8px 22px rgba(55,112,105,.11);
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html{
  scroll-behavior:smooth;
}

body{
  color:var(--text);
  background:var(--water-light);
  font-family:
    -apple-system,
    BlinkMacSystemFont,
    "Hiragino Sans",
    "Yu Gothic",
    "Meiryo",
    sans-serif;
  font-size:17px;
  line-height:1.75;
  -webkit-text-size-adjust:100%;
}

a{
  color:inherit;
  text-decoration:none;
}

img{
  display:block;
  max-width:100%;
}

.wrap{
  width:min(100%,760px);
  margin:0 auto;
  padding:
    calc(14px + env(safe-area-inset-top))
    14px
    calc(55px + env(safe-area-inset-bottom));
}

.header{
  padding:14px 0 18px;
  background:#ffffff;
  border-bottom:4px solid var(--yellow);
}

.header-inner{
  width:min(100%,760px);
  margin:0 auto;
  padding:0 14px;
  display:flex;
  align-items:center;
  gap:11px;
}

.logo{
  width:50px;
  height:50px;
  object-fit:cover;
  border:3px solid var(--yellow);
  border-radius:50%;
}

.header-title strong{
  display:block;
  color:var(--red);
  font-size:21px;
  line-height:1.2;
}

.header-title small{
  display:block;
  margin-top:3px;
  color:var(--green-dark);
  font-size:10px;
  font-weight:900;
  letter-spacing:.08em;
}

.card{
  overflow:hidden;
  border:1px solid var(--line);
  border-left:6px solid var(--red);
  border-radius:21px;
  background:#ffffff;
  box-shadow:var(--shadow);
}

.card-image{
  width:100%;
  max-height:360px;
  object-fit:cover;
  background:var(--water-light);
}

.youtube-wrap{
  position:relative;
  width:100%;
  aspect-ratio:16 / 9;
  background:#000000;
}

.youtube-wrap.youtube-short{
  aspect-ratio:9 / 16;
  max-height:70vh;
}

.youtube-wrap iframe{
  display:block;
  width:100%;
  height:100%;
  border:0;
}

.card-content{
  padding:23px 18px;
}

.date{
  display:inline-block;
  margin-bottom:10px;
  padding:4px 12px;
  color:var(--green-dark);
  background:var(--green-light);
  border-radius:999px;
  font-size:13px;
  font-weight:900;
}

h1{
  color:var(--red-dark);
  font-size:clamp(27px,7vw,40px);
  line-height:1.4;
}

.body{
  margin-top:18px;
  color:var(--text);
  font-size:17px;
  white-space:pre-line;
}

.external-link{
  display:flex;
  min-height:52px;
  margin-top:20px;
  align-items:center;
  justify-content:center;
  color:#ffffff;
  background:var(--water);
  border-radius:999px;
  font-weight:900;
}

.external-link:hover{
  background:var(--green);
}

.back-link{
  display:flex;
  min-height:54px;
  margin-top:20px;
  align-items:center;
  justify-content:center;
  color:var(--green-dark);
  background:#ffffff;
  border:1px solid var(--line);
  border-radius:15px;
  font-weight:900;
}

.share-box{
  margin-top:22px;
  padding-top:18px;
  border-top:1px solid var(--line);
}

.share-title{
  margin-bottom:10px;
  color:var(--green-dark);
  font-size:14px;
  font-weight:900;
}

.share-buttons{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:8px;
}

.share-button{
  min-height:44px;
  padding:9px 7px;
  display:flex;
  align-items:center;
  justify-content:center;
  border:0;
  border-radius:10px;
  color:#ffffff;
  font-size:14px;
  font-weight:900;
  text-align:center;
  cursor:pointer;
}

.line{
  background:#06c755;
}

.x{
  background:#111111;
}

.facebook{
  background:#1877f2;
}

.copy{
  color:var(--text);
  background:var(--yellow);
}

.notice{
  margin-top:18px;
  color:var(--muted);
  font-size:13px;
  text-align:center;
}

@media(max-width:430px){

  .header-title strong{
    font-size:18px;
  }

  .header-title small{
    font-size:9px;
  }

  .card-content{
    padding:20px 15px;
  }

</head>

<body>

<header class="header">

  <div class="header-inner">

    <a href="index.html">

      <img
        class="logo"
        src="robin-icon.jpg"
        alt="ろびんアイコン"
      >

    </a>

    <div class="header-title">

      <strong>
        ろびん
      </strong>

      <small>
        ロビンショップDX
      </small>

    </div>

  </div>

</header>

<main class="wrap">

  <article
    id="newsCard"
    class="card"
  >

    <div id="newsContent">
      読み込み中です。
    </div>

  </article>

  <a
    class="back-link"
    href="news.html"
  >
    お知らせ一覧へ戻る
  </a>

  <p class="notice">
    ろびんショップDXのお知らせを表示しています。
  </p>

</main>

<script>

const params =
  new URLSearchParams(
    window.location.search
  );

const title =
  params.get("title") ||
  "ろびんからのお知らせ";

const body =
  params.get("body") ||
  "";

const image =
  params.get("image") ||
  "";

const link =
  params.get("link") ||
  "";

const content =
  document.getElementById(
    "newsContent"
  );


function escapeHTML(value){

  return String(value || "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");

}


function safeUrl(value){

  const url =
    String(value || "").trim();

  return /^https?:\/\//i.test(url)
    ? url
    : "";

}


function convertDriveImageUrl(value){

  const url =
    safeUrl(value);

  if(!url){

    return "";

  }

  let fileId =
    "";

  const fileMatch =
    url.match(
      /drive\.google\.com\/file\/d\/([^/]+)/
    );

  if(fileMatch){

    fileId =
      fileMatch[1];

  }

  if(!fileId){

    const idMatch =
      url.match(
        /[?&]id=([^&#]+)/
      );

    if(idMatch){

      fileId =
        idMatch[1];

    }

  }

  if(!fileId){

    const googleusercontentMatch =
      url.match(
        /googleusercontent\.com\/d\/([^=/?]+)/
      );

    if(googleusercontentMatch){

      fileId =
        googleusercontentMatch[1];

    }

  }

  if(fileId){

    return(
      "https://lh3.googleusercontent.com/d/" +
      fileId +
      "=w1200"
    );

  }

  return url;

}


function getYouTubeEmbedUrl(url){

  const value =
    String(url || "").trim();

  if(!value){

    return "";

  }

  try{

    const parsed =
      new URL(value);

    const host =
      parsed.hostname.toLowerCase();

    let videoId =
      "";

    if(
      host === "youtu.be" ||
      host.endsWith(".youtu.be")
    ){

      videoId =
        parsed.pathname
          .replace(/^\/+/, "")
          .split("/")[0];

    }else if(
      host === "youtube.com" ||
      host.endsWith(".youtube.com")
    ){

      if(
        parsed.pathname === "/watch"
      ){

        videoId =
          parsed.searchParams.get("v") ||
          "";

      }else if(
        parsed.pathname.startsWith(
          "/shorts/"
        )
      ){

        videoId =
          parsed.pathname
            .split("/")[2] ||
            "";

      }else if(
        parsed.pathname.startsWith(
          "/embed/"
        )
      ){

        videoId =
          parsed.pathname
            .split("/")[2] ||
            "";

      }

    }

    if(
      !/^[A-Za-z0-9_-]{6,}$/.test(
        videoId
      )
    ){

      return "";

    }

    return(
      "https://www.youtube-nocookie.com/embed/" +
      videoId +
      "?rel=0"
    );

  }catch(error){

    return "";

  }

}


function buildShareUrl(){

  return window.location.href;

}


function renderPage(){

  const imageUrl =
    convertDriveImageUrl(
      image
    );

  const linkUrl =
    safeUrl(
      link
    );

  const youtubeEmbedUrl =
    getYouTubeEmbedUrl(
      linkUrl
    );

  const isShortVideo =
    /youtube\.com\/shorts\//i.test(
      linkUrl
    );

  const titleHtml =
    escapeHTML(
      title
    );

  const bodyHtml =
    escapeHTML(
      body
    );

  const imageHtml =
    imageUrl
      ? `
        <img
          class="card-image"
          src="${escapeHTML(imageUrl)}"
          alt="${titleHtml}"
          onerror="this.style.display='none'"
        >
      `
      : "";

  const youtubeHtml =
    youtubeEmbedUrl
      ? `
        <div
          class="${
            isShortVideo
              ? "youtube-wrap youtube-short"
              : "youtube-wrap"
          }"
        >
          <iframe
            src="${escapeHTML(youtubeEmbedUrl)}"
            title="${titleHtml}"
            loading="lazy"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
            allowfullscreen
          ></iframe>
        </div>
      `
      : "";

  const externalLinkHtml =
    linkUrl && !youtubeEmbedUrl
      ? `
        <a
          class="external-link"
          href="${escapeHTML(linkUrl)}"
          target="_blank"
          rel="noopener noreferrer"
        >
          詳しく見る
        </a>
      `
      : "";

  const shareUrl =
    buildShareUrl();

  const shareText =
    (
      title +
      " " +
      body
    )
    .replace(/\s+/g, " ")
    .trim();

  const lineUrl =
    "https://line.me/R/msg/text/?" +
    encodeURIComponent(
      shareText +
      "\n" +
      shareUrl
    );

  const xUrl =
    "https://twitter.com/intent/tweet?text=" +
    encodeURIComponent(
      shareText
    ) +
    "&url=" +
    encodeURIComponent(
      shareUrl
    );

  const facebookUrl =
    "https://www.facebook.com/sharer/sharer.php?u=" +
    encodeURIComponent(
      shareUrl
    );

  content.innerHTML = `

    ${imageHtml}

    ${youtubeHtml}

    <div class="card-content">

      <div class="date">
        ろびんからのお知らせ
      </div>

      <h1>
        ${titleHtml}
      </h1>

      ${
        bodyHtml
          ? `
            <p class="body">
              ${bodyHtml}
            </p>
          `
          : ""
      }

      ${externalLinkHtml}

      <div class="share-box">

        <p class="share-title">
          このお知らせを共有する
        </p>

        <div class="share-buttons">

          <a
            class="share-button line"
            href="${escapeHTML(lineUrl)}"
            target="_blank"
            rel="noopener noreferrer"
          >
            LINE
          </a>

          <a
            class="share-button x"
            href="${escapeHTML(xUrl)}"
            target="_blank"
            rel="noopener noreferrer"
          >
            X
          </a>

          <a
            class="share-button facebook"
            href="${escapeHTML(facebookUrl)}"
            target="_blank"
            rel="noopener noreferrer"
          >
            Facebook
          </a>

          <button
            class="share-button copy"
            type="button"
            id="copyButton"
          >
            リンクをコピー
          </button>

        </div>

      </div>

    </div>

  `;

  document.title =
    title +
    "｜ろびんショップDX";

  const copyButton =
    document.getElementById(
      "copyButton"
    );

  if(copyButton){

    copyButton.addEventListener(
      "click",
      async function(){

        try{

          await navigator.clipboard.writeText(
            shareUrl
          );

          copyButton.textContent =
            "コピーしました";

          setTimeout(
            function(){

              copyButton.textContent =
                "リンクをコピー";

            },
            1600
          );

        }catch(error){

          window.prompt(
            "下のリンクをコピーしてください。",
            shareUrl
          );

        }

      }
    );

  }

}


renderPage();

</script>

</body>
</html>
