<style>

:root{
  --red:#c63743;
  --red-dark:#9f2935;
  --yellow:#e7bf5b;
  --yellow-light:#fff8df;

  --water:#2996a4;
  --water-light:#eaf7f6;

  --green:#6d9e62;
  --green-dark:#356d57;
  --green-light:#edf6e9;

  --text:#294944;
  --muted:#6b7d78;
  --line:#d5e7e1;

  --shadow:0 8px 22px rgba(55,112,105,.11);
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html{
  scroll-behavior:smooth;
}

body{
  color:var(--text);
  background:var(--water-light);
  font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic","Meiryo",sans-serif;
  font-size:17px;
  line-height:1.75;
  -webkit-text-size-adjust:100%;
}

a{
  color:inherit;
  text-decoration:none;
}

img{
  display:block;
  max-width:100%;
}

.wrap{
  width:min(100%,760px);
  margin:0 auto;
  padding:calc(14px + env(safe-area-inset-top)) 14px calc(55px + env(safe-area-inset-bottom));
}

.header{
  padding:14px 0 18px;
  background:#ffffff;
  border-bottom:4px solid var(--yellow);
}

.header-inner{
  width:min(100%,760px);
  margin:0 auto;
  padding:0 14px;
  display:flex;
  align-items:center;
  gap:11px;
}

.logo{
  width:50px;
  height:50px;
  object-fit:cover;
  border:3px solid var(--yellow);
  border-radius:50%;
}

.header-title strong{
  display:block;
  color:var(--red);
  font-size:21px;
  line-height:1.2;
}

.header-title small{
  display:block;
  margin-top:3px;
  color:var(--green-dark);
  font-size:10px;
  font-weight:900;
  letter-spacing:.08em;
}

.card{
  overflow:hidden;
  border:1px solid var(--line);
  border-left:6px solid var(--green);
  border-radius:21px;
  background:#ffffff;
  box-shadow:var(--shadow);
}

.card-content{
  padding:23px 18px;
}

.card-image{
  width:100%;
  aspect-ratio:1 / 1;
  object-fit:cover;
  background:var(--water-light);
}

.voice-head{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  flex-wrap:wrap;
}

.voice-name{
  color:var(--green-dark);
  font-size:22px;
  font-weight:900;
}

.voice-date{
  color:var(--muted);
  font-size:13px;
  font-weight:700;
}

.stars{
  margin-top:9px;
  color:#d59c15;
  font-size:28px;
  letter-spacing:2px;
  line-height:1.2;
}

.voice-body{
  margin-top:17px;
  color:var(--text);
  white-space:pre-wrap;
  font-size:17px;
  line-height:1.85;
}

.voice-images{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:8px;
  margin-top:18px;
}

.voice-images img{
  width:100%;
  aspect-ratio:1 / 1;
  object-fit:cover;
  border:1px solid var(--line);
  border-radius:12px;
  background:var(--water-light);
}

.share-box{
  margin-top:22px;
  padding-top:18px;
  border-top:1px solid var(--line);
}

.share-title{
  margin-bottom:10px;
  color:var(--green-dark);
  font-size:14px;
  font-weight:900;
}

.share-buttons{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:8px;
}

.share-button{
  min-height:44px;
  padding:9px 7px;
  display:flex;
  align-items:center;
  justify-content:center;
  border:0;
  border-radius:10px;
  color:#ffffff;
  font-size:14px;
  font-weight:900;
  text-align:center;
  cursor:pointer;
}

.line{
  background:#06c755;
}

.x{
  background:#111111;
}

.facebook{
  background:#1877f2;
}

.copy{
  color:var(--text);
  background:var(--yellow);
}

.back-link{
  display:flex;
  min-height:54px;
  margin-top:20px;
  align-items:center;
  justify-content:center;
  color:var(--green-dark);
  background:#ffffff;
  border:1px solid var(--line);
  border-radius:15px;
  font-weight:900;
}

.notice{
  margin-top:18px;
  color:var(--muted);
  font-size:13px;
  text-align:center;
}

@media(max-width:430px){

  .header-title strong{
    font-size:18px;
  }

  .header-title small{
    font-size:9px;
  }

  .card-content{
    padding:20px 15px;
  }

}

</style>

<body>

<header class="header">

  <div class="header-inner">

    <a href="index.html">

      <img
        class="logo"
        src="robin-icon.jpg"
        alt="ろびんアイコン"
      >

    </a>

    <div class="header-title">

      <strong>
        ろびん
      </strong>

      <small>
        ロビンショップDX
      </small>

    </div>

  </div>

</header>

<main class="wrap">

  <article
    id="voiceCard"
    class="card"
  >

    <div
      id="voiceContent"
      class="card-content"
    >
      読み込み中です。
    </div>

  </article>

  <a
    class="back-link"
    href="voice.html"
  >
    お客様の声一覧へ戻る
  </a>

  <p class="notice">
    ろびんショップDXのお客様の声を表示しています。
  </p>

</main>

<script>

const params =
  new URLSearchParams(
    window.location.search
  );

const name =
  params.get("name") ||
  "匿名";

const date =
  params.get("date") ||
  "";

const stars =
  Number(
    params.get("stars") ||
    "0"
  );

const body =
  params.get("body") ||
  "";

const images = [];

for(
  let index = 1;
  index <= 5;
  index++
){

  const image =
    params.get(
      "image" + index
    );

  if(image){

    images.push(image);

  }

}

const content =
  document.getElementById(
    "voiceContent"
  );


function escapeHTML(value){

  return String(value || "")
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;")
    .replace(/'/g,"&#039;");

}


function renderStars(value){

  const count =
    Math.max(
      0,
      Math.min(
        5,
        Number(value) || 0
      )
    );

  return(
    "★".repeat(count) +
    "☆".repeat(5 - count)
  );

}


function buildPage(){

  const pageUrl =
    window.location.href;

  const safeName =
    escapeHTML(name);

  const safeDate =
    escapeHTML(date);

  const safeBody =
    escapeHTML(body);

  const shareText =
    (
      name +
      "さんのろびん口コミ " +
      body
    )
    .replace(/\s+/g," ")
    .trim();

  const lineUrl =
    "https://line.me/R/msg/text/?" +
    encodeURIComponent(
      shareText +
      "\n" +
      pageUrl
    );

  const xUrl =
    "https://twitter.com/intent/tweet?text=" +
    encodeURIComponent(shareText) +
    "&url=" +
    encodeURIComponent(pageUrl);

  const facebookUrl =
    "https://www.facebook.com/sharer/sharer.php?u=" +
    encodeURIComponent(pageUrl);

  const imageHtml =
    images.length
      ? `
        <div class="voice-images">
          ${
            images.map(
              url => `
                <img
                  src="${escapeHTML(url)}"
                  alt="お客様の投稿写真"
                  loading="lazy"
                  onerror="this.style.display='none'"
                >
              `
            ).join("")
          }
        </div>
      `
      : "";

  content.innerHTML = `

    <div class="voice-head">

      <div class="voice-name">
        ${safeName}
      </div>

      <div class="voice-date">
        ${safeDate}
      </div>

    </div>

    <div class="stars">
      ${renderStars(stars)}
    </div>

    ${
      safeBody
        ? `
          <p class="voice-body">
            ${safeBody}
          </p>
        `
        : ""
    }

    ${imageHtml}

    <div class="share-box">

      <p class="share-title">
        この口コミを共有する
      </p>

      <div class="share-buttons">

        <a
          class="share-button line"
          href="${escapeHTML(lineUrl)}"
          target="_blank"
          rel="noopener noreferrer"
        >
          LINE
        </a>

        <a
          class="share-button x"
          href="${escapeHTML(xUrl)}"
          target="_blank"
          rel="noopener noreferrer"
        >
          X
        </a>

        <a
          class="share-button facebook"
          href="${escapeHTML(facebookUrl)}"
          target="_blank"
          rel="noopener noreferrer"
        >
          Facebook
        </a>

        <button
          class="share-button copy"
          type="button"
          id="copyButton"
        >
          リンクをコピー
        </button>

      </div>

    </div>

  `;

  document.title =
    name +
    "さんのお客様の声｜ろびんショップDX";

  const copyButton =
    document.getElementById(
      "copyButton"
    );

  if(copyButton){

    copyButton.addEventListener(
      "click",
      async function(){

        try{

          await navigator.clipboard.writeText(
            pageUrl
          );

          copyButton.textContent =
            "コピーしました";

          setTimeout(
            function(){

              copyButton.textContent =
                "リンクをコピー";

            },
            1600
          );

        }catch(error){

          window.prompt(
            "下のリンクをコピーしてください。",
            pageUrl
          );

        }

      }
    );

  }

}


buildPage();

</script>

</body>
