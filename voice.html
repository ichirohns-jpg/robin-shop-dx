<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>お客様の声｜ろびんショップDX</title>

  <style>
    :root {
      --red: #b51f2a;
      --dark-red: #7d1018;
      --yellow: #f4c400;
      --charcoal: #202124;
      --cream: #fffaf0;
      --gray: #666;
      --line: #eadfca;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      color: var(--charcoal);
      background: var(--cream);
      font-family:
        -apple-system,
        BlinkMacSystemFont,
        "Hiragino Kaku Gothic ProN",
        "Yu Gothic",
        "Meiryo",
        sans-serif;
      line-height: 1.8;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    img {
      max-width: 100%;
      display: block;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 10;
      color: #fff;
      background: rgba(32, 33, 36, 0.97);
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.15);
    }

    .header-inner {
      max-width: 1120px;
      margin: 0 auto;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 1.2rem;
      font-weight: 900;
      white-space: nowrap;
    }

    .brand-mark {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      object-fit: cover;
      background: #fff;
    }

    nav {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 8px;
    }

    nav a {
      padding: 6px 10px;
      border-radius: 8px;
      font-size: 0.88rem;
    }

    nav a:hover,
    nav a.active {
      background: var(--red);
    }

    .hero {
      min-height: 280px;
      padding: 70px 20px;
      color: #fff;
      background:
        linear-gradient(
          rgba(32, 33, 36, 0.68),
          rgba(32, 33, 36, 0.76)
        ),
        url("robin-main-banner.jpg") center / cover;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .hero h1 {
      margin: 0 0 12px;
      font-size: clamp(2rem, 5vw, 3.4rem);
      letter-spacing: 0.08em;
    }

    .hero p {
      margin: 0;
      font-size: 1.05rem;
    }

    main {
      max-width: 1120px;
      margin: 0 auto;
      padding: 56px 20px 80px;
    }

    .section-title {
      margin: 0 0 12px;
      color: var(--dark-red);
      font-size: clamp(1.8rem, 5vw, 2.7rem);
      text-align: center;
    }

    .section-lead {
      max-width: 760px;
      margin: 0 auto 32px;
      color: var(--gray);
      text-align: center;
    }

    .voice-section {
      margin-bottom: 46px;
    }

    .voice-list {
      display: grid;
      gap: 22px;
    }

    .voice-card {
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: #fff;
      box-shadow: 0 8px 22px rgba(90, 55, 20, 0.08);
    }

    .voice-image {
      width: 100%;
      max-height: 380px;
      object-fit: cover;
      background: #f3eee3;
    }

    .voice-content {
      padding: 24px;
    }

    .voice-top {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 8px;
    }

    .voice-name {
      color: var(--dark-red);
      font-size: 1.2rem;
      font-weight: 900;
    }

    .voice-date {
      color: var(--gray);
      font-size: 0.86rem;
    }

    .stars {
      margin: 8px 0 12px;
      color: #f2b800;
      font-size: 1.55rem;
      letter-spacing: 2px;
    }

    .voice-body {
      margin: 0;
      color: #444;
      white-space: pre-line;
    }

    .empty {
      padding: 40px 20px;
      border: 1px dashed var(--line);
      border-radius: 16px;
      color: var(--gray);
      background: #fff;
      text-align: center;
    }

    .post-area {
      padding: 30px 24px;
      border: 1px solid var(--line);
      border-radius: 20px;
      background: #fff;
      box-shadow: 0 8px 22px rgba(90, 55, 20, 0.08);
    }

    .post-area h2 {
      margin: 0 0 10px;
      color: var(--dark-red);
      text-align: center;
    }

    .post-area > p {
      margin: 0 0 24px;
      color: var(--gray);
      text-align: center;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 7px;
      font-weight: 800;
    }

    input,
    textarea {
      width: 100%;
      padding: 13px 14px;
      border: 1px solid #d8cdbb;
      border-radius: 10px;
      background: #fffdf8;
      color: var(--charcoal);
      font: inherit;
      font-size: 16px;
    }

    textarea {
      min-height: 150px;
      resize: vertical;
    }

    input:focus,
    textarea:focus {
      outline: 3px solid rgba(244, 196, 0, 0.35);
      border-color: var(--yellow);
    }

    .star-select {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }

    .star-button {
      padding: 0 3px;
      border: 0;
      color: #c8c8c8;
      background: transparent;
      font-size: 2.2rem;
      line-height: 1;
      cursor: pointer;
    }

    .star-button.active {
      color: #f2b800;
    }

    .file-label {
      display: block;
      padding: 18px;
      border: 2px dashed #d8cdbb;
      border-radius: 12px;
      color: var(--dark-red);
      background: #fffdf8;
      text-align: center;
      cursor: pointer;
    }

    #voice-image {
      display: none;
    }

    .selected-file {
      margin-top: 8px;
      color: var(--gray);
      font-size: 0.88rem;
      text-align: center;
    }

    .preview {
      display: none;
      max-height: 300px;
      margin: 16px auto 0;
      border-radius: 12px;
      object-fit: contain;
    }

    .preview.show {
      display: block;
    }

    .submit-button {
      width: 100%;
      min-height: 52px;
      padding: 13px 20px;
      border: 0;
      border-radius: 999px;
      color: #fff;
      background: var(--red);
      font: inherit;
      font-weight: 900;
      cursor: pointer;
    }

    .submit-button:hover {
      background: var(--dark-red);
    }

    .submit-button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .status {
      display: none;
      margin-top: 18px;
      padding: 14px;
      border-radius: 10px;
      font-weight: 700;
      text-align: center;
    }

    .status.success {
      display: block;
      color: #155b30;
      background: #e8f7ed;
      border: 1px solid #9bd0aa;
    }

    .status.error {
      display: block;
      color: var(--dark-red);
      background: #fff0f0;
      border: 1px solid #e2a1a1;
    }

    .page-links {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-top: 46px;
    }

    .page-link {
      padding: 16px 10px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fff;
      text-align: center;
      font-weight: 700;
    }

    .page-link:hover {
      color: #fff;
      background: var(--red);
    }

    footer {
      padding: 34px 20px;
      color: #fff;
      background: var(--charcoal);
      text-align: center;
    }

    footer p {
      margin: 4px 0;
    }

    @media (max-width: 760px) {
      .header-inner {
        align-items: flex-start;
        flex-direction: column;
      }

      nav {
        width: 100%;
        justify-content: flex-start;
      }

      main {
        padding: 42px 16px 64px;
      }

      .post-area {
        padding: 24px 18px;
      }

      .page-links {
        grid-template-columns: repeat(2, 1fr);
      }
    }
  </style>
</head>

<body>

  <header>
    <div class="header-inner">
      <a class="brand" href="index.html">
        <img
          class="brand-mark"
          src="ロビンアイコン.jpg"
          alt="ろびんアイコン"
        >
        <span>ろびんショップDX</span>
      </a>

      <nav>
        <a href="index.html">ホーム</a>
        <a href="menu.html">メニュー</a>
        <a href="news.html">お知らせ</a>
        <a href="access.html">店舗情報</a>
        <a href="voice.html" class="active">お客様の声</a>
      </nav>
    </div>
  </header>

  <section class="hero">
    <div>
      <h1>お客様の声</h1>
      <p>ろびんを訪れた皆さまの写真・星評価・コメントです。</p>
    </div>
  </section>

  <main>

    <section class="voice-section">
      <h2 class="section-title">みんなの写真・口コミ</h2>

      <p class="section-lead">
        管理者が確認して公開したお客様の写真、星評価、コメントを掲載しています。
      </p>

      <div id="voice-list" class="voice-list">
        <div class="empty">
          公開中の写真・口コミを読み込んでいます。
        </div>
      </div>
    </section>

    <section class="post-area" id="post">
      <h2>写真・口コミを投稿する</h2>

      <p>
        ご来店の感想や料理の写真をお寄せください。<br>
        投稿内容は管理者確認後に公開されます。
      </p>

      <form id="voice-form">

        <div class="form-group">
          <label for="voice-name">お名前</label>

          <input
            id="voice-name"
            type="text"
            placeholder="例：志木太郎"
            required
          >
        </div>

        <div class="form-group">
          <label>星評価</label>

          <div
            id="star-select"
            class="star-select"
          >
            <button
              class="star-button active"
              type="button"
              data-star="1"
            >★</button>

            <button
              class="star-button active"
              type="button"
              data-star="2"
            >★</button>

            <button
              class="star-button active"
              type="button"
              data-star="3"
            >★</button>

            <button
              class="star-button active"
              type="button"
              data-star="4"
            >★</button>

            <button
              class="star-button active"
              type="button"
              data-star="5"
            >★</button>
          </div>
        </div>

        <div class="form-group">
          <label for="voice-body">コメント</label>

          <textarea
            id="voice-body"
            placeholder="料理やお店の感想を入力してください。"
            required
          ></textarea>
        </div>

        <div class="form-group">
          <label for="voice-image">写真</label>

          <label class="file-label" for="voice-image">
            📷 カメラロールから写真を選択
          </label>

          <input
            id="voice-image"
            type="file"
            accept="image/*"
          >

          <div id="selected-file" class="selected-file">
            写真は任意です。
          </div>

          <img
            id="preview"
            class="preview"
            alt="選択した写真"
          >
        </div>

        <button
          id="submit-button"
          class="submit-button"
          type="submit"
        >
          📷 写真・口コミを投稿する
        </button>

        <div id="status" class="status"></div>
      </form>
    </section>

    <div class="page-links">
      <a class="page-link" href="index.html">ホーム</a>
      <a class="page-link" href="menu.html">メニュー</a>
      <a class="page-link" href="news.html">お知らせ</a>
      <a class="page-link" href="access.html">店舗情報</a>
    </div>

  </main>

  <footer>
    <p>ろびんショップDX</p>
    <p>埼玉県志木市の町中華・ラーメン店「ろびん」</p>
  </footer>

  <script>
    const GAS_URL =
      "https://script.google.com/macros/s/AKfycbyQYbLdtiWhEr27ZAWJi3D98eVJdXlD-lMr2D6T6RxvfIb_k2kFHDxxfdKE_WTiUCZ1HQ/exec";

    const voiceList =
      document.getElementById("voice-list");

    const voiceForm =
      document.getElementById("voice-form");

    const nameInput =
      document.getElementById("voice-name");

    const bodyInput =
      document.getElementById("voice-body");

    const imageInput =
      document.getElementById("voice-image");

    const selectedFile =
      document.getElementById("selected-file");

    const preview =
      document.getElementById("preview");

    const submitButton =
      document.getElementById("submit-button");

    const statusBox =
      document.getElementById("status");

    const starButtons =
      document.querySelectorAll(".star-button");

    let selectedStars = 5;
    let selectedImageData = "";
    let selectedImageName = "";
    let selectedImageType = "";


    function escapeHTML(value) {
      return String(value || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }


    function safeUrl(value) {
      const url =
        String(value || "").trim();

      return /^https?:\/\//i.test(url)
        ? url
        : "";
    }


    function convertDriveImageUrl(value) {
      const url =
        safeUrl(value);

      if (!url) {
        return "";
      }

      let fileId = "";

      const fileMatch =
        url.match(
          /drive\.google\.com\/file\/d\/([^/]+)/
        );

      if (fileMatch) {
        fileId = fileMatch[1];
      }

      if (!fileId) {
        const idMatch =
          url.match(
            /[?&]id=([^&#]+)/
          );

        if (idMatch) {
          fileId = idMatch[1];
        }
      }

      if (fileId) {
        return (
          "https://lh3.googleusercontent.com/d/" +
          fileId +
          "=w1200"
        );
      }

      return url;
    }


    function starsHTML(value) {
      const stars =
        Math.max(
          0,
          Math.min(
            5,
            Number(value) || 0
          )
        );

      let html = "";

      for (let i = 1; i <= 5; i++) {
        html += i <= stars ? "★" : "☆";
      }

      return html;
    }


    function renderVoices(items) {
      if (
        !Array.isArray(items) ||
        items.length === 0
      ) {
        voiceList.innerHTML = `
          <div class="empty">
            公開中の写真・口コミはまだありません。
          </div>
        `;

        return;
      }

      voiceList.innerHTML =
        items.map(item => {
          const imageUrl =
            convertDriveImageUrl(
              item.imageUrl ||
              item.image ||
              ""
            );

          const imageHTML =
            imageUrl
              ? `
                <img
                  class="voice-image"
                  src="${escapeHTML(imageUrl)}"
                  alt="お客様の写真"
                  loading="lazy"
                >
              `
              : "";

          return `
            <article class="voice-card">
              ${imageHTML}

              <div class="voice-content">
                <div class="voice-top">
                  <div class="voice-name">
                    ${escapeHTML(item.name)}
                  </div>

                  <div class="voice-date">
                    ${escapeHTML(item.date)}
                  </div>
                </div>

                <div class="stars">
                  ${starsHTML(item.stars)}
                </div>

                <p class="voice-body">
                  ${escapeHTML(item.body)}
                </p>
              </div>
            </article>
          `;
        }).join("");
    }


    async function readJSON(response) {
      const text =
        await response.text();

      try {
        return JSON.parse(text);
      } catch (error) {
        throw new Error(
          "GASから正しい返答を受け取れませんでした。"
        );
      }
    }


    async function loadVoices() {
      try {
        const response =
          await fetch(
            GAS_URL +
            "?mode=voices&t=" +
            Date.now(),
            {
              method: "GET",
              cache: "no-store"
            }
          );

        const data =
          await readJSON(response);

        if (!data.ok) {
          throw new Error(
            data.error ||
            "口コミ取得エラー"
          );
        }

        renderVoices(
          data.items || []
        );

      } catch (error) {
        voiceList.innerHTML = `
          <div class="empty">
            公開中の写真・口コミはまだありません。
          </div>
        `;
      }
    }


    function readFileAsDataURL(file) {
      return new Promise(
        (resolve, reject) => {
          const reader =
            new FileReader();

          reader.onload =
            () => resolve(reader.result);

          reader.onerror =
            () => reject(
              new Error(
                "写真を読み込めませんでした。"
              )
            );

          reader.readAsDataURL(file);
        }
      );
    }


    function loadImage(dataUrl) {
      return new Promise(
        (resolve, reject) => {
          const image =
            new Image();

          image.onload =
            () => resolve(image);

          image.onerror =
            () => reject(
              new Error(
                "写真を表示できませんでした。"
              )
            );

          image.src =
            dataUrl;
        }
      );
    }


    async function compressImage(file) {
      const originalData =
        await readFileAsDataURL(file);

      const image =
        await loadImage(originalData);

      const maxSize = 1600;

      let width =
        image.naturalWidth;

      let height =
        image.naturalHeight;

      if (
        width > maxSize ||
        height > maxSize
      ) {
        const scale =
          Math.min(
            maxSize / width,
            maxSize / height
          );

        width =
          Math.round(width * scale);

        height =
          Math.round(height * scale);
      }

      const canvas =
        document.createElement("canvas");

      canvas.width =
        width;

      canvas.height =
        height;

      const context =
        canvas.getContext("2d");

      context.fillStyle =
        "#ffffff";

      context.fillRect(
        0,
        0,
        width,
        height
      );

      context.drawImage(
        image,
        0,
        0,
        width,
        height
      );

      return canvas.toDataURL(
        "image/jpeg",
        0.82
      );
    }


    function updateStars(value) {
      selectedStars =
        Number(value);

      starButtons.forEach(button => {
        const star =
          Number(
            button.dataset.star
          );

        button.classList.toggle(
          "active",
          star <= selectedStars
        );
      });
    }


    starButtons.forEach(button => {
      button.addEventListener(
        "click",
        () => {
          updateStars(
            button.dataset.star
          );
        }
      );
    });


    imageInput.addEventListener(
      "change",
      async () => {
        const file =
          imageInput.files[0];

        if (!file) {
          return;
        }

        selectedFile.textContent =
          "写真を準備しています…";

        try {
          selectedImageData =
            await compressImage(file);

          selectedImageName =
            file.name ||
            "voice-image";

          selectedImageType =
            "image/jpeg";

          preview.src =
            selectedImageData;

          preview.classList.add(
            "show"
          );

          selectedFile.textContent =
            "選択中：" + file.name;

        } catch (error) {
          selectedFile.textContent =
            "写真を読み込めませんでした。";

          statusBox.textContent =
            error.message;

          statusBox.className =
            "status error";
        }
      }
    );


    voiceForm.addEventListener(
      "submit",
      async event => {
        event.preventDefault();

        statusBox.className =
          "status";

        const name =
          nameInput.value.trim();

        const body =
          bodyInput.value.trim();

        if (!name || !body) {
          statusBox.textContent =
            "お名前とコメントを入力してください。";

          statusBox.className =
            "status error";

          return;
        }

        const payload = {
          mode: "saveVoice",
          name: name,
          stars: selectedStars,
          body: body,
          imageData: selectedImageData,
          imageName: selectedImageName,
          imageType: selectedImageType
        };

        submitButton.disabled =
          true;

        submitButton.textContent =
          "投稿中です…";

        try {
          const response =
            await fetch(
              GAS_URL +
              "?mode=saveVoice",
              {
                method: "POST",
                headers: {
                  "Content-Type":
                    "text/plain;charset=utf-8"
                },
                body: JSON.stringify(payload)
              }
            );

          const result =
            await readJSON(response);

          if (!result.ok) {
            throw new Error(
              result.error ||
              "投稿できませんでした。"
            );
          }

          statusBox.textContent =
            "投稿を受け付けました。管理者確認後に公開されます。";

          statusBox.className =
            "status success";

          voiceForm.reset();

          selectedStars =
            5;

          updateStars(5);

          selectedImageData =
            "";

          selectedImageName =
            "";

          selectedImageType =
            "";

          selectedFile.textContent =
            "写真は任意です。";

          preview.classList.remove(
            "show"
          );

          preview.removeAttribute(
            "src"
          );

        } catch (error) {
          statusBox.textContent =
            error.message ||
            "投稿できませんでした。";

          statusBox.className =
            "status error";

        } finally {
          submitButton.disabled =
            false;

          submitButton.textContent =
            "📷 写真・口コミを投稿する";
        }
      }
    );


    updateStars(5);
    loadVoices();
  </script>

</body>
</html>
