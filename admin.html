<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理画面｜ろびんショップDX</title>

  <style>
    :root {
      --red: #970d1b;
      --dark: #272629;
      --cream: #fffaf0;
      --beige: #f0e8d7;
      --line: #e3d6c0;
      --text: #242124;
      --green: #188543;
      --gray: #777;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--cream);
      color: var(--text);
      font-family:
        -apple-system,
        BlinkMacSystemFont,
        "Hiragino Kaku Gothic ProN",
        "Yu Gothic",
        Meiryo,
        sans-serif;
    }

    header {
      background: var(--dark);
      color: #fff;
      padding: 22px 16px;
      text-align: center;
    }

    header h1 {
      margin: 0;
      font-size: clamp(25px, 6vw, 42px);
      font-weight: 900;
    }

    header p {
      margin: 8px 0 0;
      color: #ddd;
      font-size: 14px;
      font-weight: 700;
    }

    main {
      width: min(100% - 24px, 1050px);
      margin: 0 auto;
      padding: 24px 0 60px;
    }

    .section {
      background: #fff;
      border: 2px solid var(--line);
      border-radius: 24px;
      padding: 22px;
      margin-bottom: 24px;
      box-shadow: 0 6px 18px rgba(80, 50, 20, .06);
    }

    .section h2 {
      margin: 0 0 18px;
      color: var(--red);
      font-size: clamp(23px, 5vw, 34px);
      font-weight: 900;
    }

    .section-description {
      color: #555;
      font-weight: 700;
      line-height: 1.7;
    }

    .form-row {
      margin-top: 16px;
    }

    label {
      display: block;
      margin-bottom: 7px;
      font-weight: 900;
    }

    input,
    textarea,
    select {
      width: 100%;
      border: 2px solid var(--line);
      border-radius: 12px;
      background: #fffdf8;
      padding: 13px;
      color: var(--text);
      font: inherit;
      font-size: 16px;
    }

    textarea {
      min-height: 130px;
      resize: vertical;
      line-height: 1.7;
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 14px 20px;
      font: inherit;
      font-weight: 900;
      cursor: pointer;
    }

    button:disabled {
      opacity: .5;
      cursor: wait;
    }

    .primary-button {
      width: 100%;
      margin-top: 22px;
      background: var(--red);
      color: #fff;
      font-size: 18px;
    }

    .refresh-button {
      background: var(--dark);
      color: #fff;
      margin-bottom: 18px;
    }

    .success-button {
      background: var(--green);
      color: #fff;
      width: 100%;
      margin-top: 18px;
      font-size: 18px;
    }

    .message {
      display: none;
      margin-top: 16px;
      padding: 14px;
      border-radius: 12px;
      text-align: center;
      font-weight: 800;
      line-height: 1.6;
    }

    .message.success {
      display: block;
      background: #e4f7e8;
      color: #176527;
    }

    .message.error {
      display: block;
      background: #ffe4e4;
      color: #8d1111;
    }

    .list {
      display: grid;
      gap: 18px;
    }

    .card {
      border: 2px solid var(--line);
      border-radius: 18px;
      background: #fffaf5;
      padding: 18px;
    }

    .card h3 {
      margin: 10px 0;
      font-size: 21px;
    }

    .card p {
      white-space: pre-wrap;
      line-height: 1.7;
      font-weight: 600;
    }

    .meta {
      color: var(--gray);
      font-size: 14px;
      font-weight: 800;
    }

    .status {
      display: inline-block;
      border-radius: 999px;
      padding: 6px 12px;
      background: #eee;
      color: #555;
      font-size: 13px;
      font-weight: 900;
    }

    .status.public {
      background: #dff4e4;
      color: #187634;
    }

    .status.private {
      background: #ffe1e1;
      color: #8d1111;
    }

    .status.pending {
      background: #fff1bd;
      color: #715500;
    }

    .stars {
      color: #f2ad00;
      font-size: 26px;
      letter-spacing: 2px;
      margin-top: 8px;
    }

    .photo-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
      margin-top: 14px;
    }

    .photo-grid img {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: #eee;
    }

    .empty {
      padding: 22px;
      border-radius: 14px;
      background: var(--beige);
      color: #6b6459;
      text-align: center;
      font-weight: 800;
      line-height: 1.7;
    }

    .loading {
      padding: 20px;
      color: var(--gray);
      text-align: center;
      font-weight: 700;
    }

    .small-link {
      display: inline-block;
      margin-top: 12px;
      color: var(--red);
      font-weight: 800;
      text-decoration: underline;
    }

    @media (max-width: 640px) {
      main {
        width: min(100% - 14px, 1050px);
      }

      .section {
        padding: 17px 14px;
        border-radius: 19px;
      }

      .photo-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }
  </style>
</head>

<body>
  <header>
    <h1>ろびんショップDX 管理画面</h1>
    <p>お知らせとお客様の声を管理します</p>
  </header>

  <main>
    <section class="section">
      <h2>お知らせを登録する</h2>

      <form id="newsForm">
        <div class="form-row">
          <label for="newsDate">日付</label>
          <input id="newsDate" type="date">
        </div>

        <div class="form-row">
          <label for="newsTitle">タイトル</label>
          <input id="newsTitle" type="text" placeholder="お知らせのタイトル">
        </div>

        <div class="form-row">
          <label for="newsBody">本文</label>
          <textarea id="newsBody" placeholder="お知らせ本文"></textarea>
        </div>

        <div class="form-row">
          <label for="newsImageUrl">画像URL</label>
          <input id="newsImageUrl" type="url" placeholder="必要な場合だけ入力">
        </div>

        <div class="form-row">
          <label for="newsExternalLink">外部リンク・YouTube URL</label>
          <input id="newsExternalLink" type="url" placeholder="必要な場合だけ入力">
        </div>

        <div class="form-row">
          <label for="newsStatus">公開状態</label>
          <select id="newsStatus">
            <option value="非公開">非公開</option>
            <option value="公開">公開</option>
          </select>
        </div>

        <button id="newsSubmit" class="primary-button" type="submit">
          お知らせを保存する
        </button>

        <div id="newsMessage" class="message"></div>
      </form>
    </section>

    <section class="section">
      <h2>登録済みのお知らせ</h2>

      <button id="newsRefresh" class="refresh-button" type="button">
        お知らせを更新
      </button>

      <div id="newsLoading" class="loading">読み込み中です。</div>
      <div id="newsEmpty" class="empty" style="display:none;">
        お知らせはまだありません。
      </div>
      <div id="newsList" class="list"></div>
    </section>

    <section class="section">
      <h2>お客様の声を確認する</h2>

      <p class="section-description">
        投稿された写真、星評価、コメントを確認してから公開してください。
      </p>

      <button id="voiceRefresh" class="refresh-button" type="button">
        お客様の声を更新
      </button>

      <div id="voiceLoading" class="loading">読み込み中です。</div>
      <div id="voiceEmpty" class="empty" style="display:none;">
        確認待ちのお客様の声はありません。
      </div>
      <div id="voiceList" class="list"></div>
    </section>
  </main>

  <script>
    const GAS_URL =
      "https://script.google.com/macros/s/AKfycbyQYbLdtiWhEr27ZAWJi3D98eVJdXlD-lMr2D6T6RxvfIb_k2kFHDxxfdKE_WTiUCZ1HQ/exec";

    const newsForm = document.getElementById("newsForm");
    const newsSubmit = document.getElementById("newsSubmit");
    const newsMessage = document.getElementById("newsMessage");

    const newsLoading = document.getElementById("newsLoading");
    const newsEmpty = document.getElementById("newsEmpty");
    const newsList = document.getElementById("newsList");

    const voiceLoading = document.getElementById("voiceLoading");
    const voiceEmpty = document.getElementById("voiceEmpty");
    const voiceList = document.getElementById("voiceList");

    function showMessage(element, text, type) {
      element.textContent = text;
      element.className = "message " + type;
    }

    function clearMessage(element) {
      element.textContent = "";
      element.className = "message";
    }

    async function getJson(mode) {
      const response = await fetch(
        GAS_URL + "?mode=" + encodeURIComponent(mode) + "&v=" + Date.now(),
        {
          cache: "no-store"
        }
      );

      return await response.json();
    }

    async function postJson(payload) {
      const response = await fetch(GAS_URL, {
        method: "POST",
        body: JSON.stringify(payload)
      });

      return await response.json();
    }

    function normalizeItems(json) {
      if (Array.isArray(json)) {
        return json;
      }

      if (Array.isArray(json.items)) {
        return json.items;
      }

      if (Array.isArray(json.news)) {
        return json.news;
      }

      if (Array.isArray(json.voices)) {
        return json.voices;
      }

      if (Array.isArray(json.data)) {
        return json.data;
      }

      return [];
    }

    function getValue(item, keys) {
      for (const key of keys) {
        if (
          item &&
          item[key] !== undefined &&
          item[key] !== null &&
          item[key] !== ""
        ) {
          return item[key];
        }
      }

      return "";
    }

    function getRowNumber(item) {
      return Number(
        getValue(item, [
          "rowNumber",
          "row",
          "row_number",
          "行番号",
          "_row"
        ])
      );
    }

    function getStatus(item) {
      return String(
        getValue(item, [
          "status",
          "publicStatus",
          "public",
          "公開状態",
          "公開"
        ]) || "非公開"
      );
    }

    function convertImageUrl(url) {
      if (!url) return "";

      const value = String(url).trim();

      if (value.includes("googleusercontent.com")) {
        return value;
      }

      const patterns = [
        /\/d\/([a-zA-Z0-9_-]+)/,
        /[?&]id=([a-zA-Z0-9_-]+)/,
        /file\/d\/([a-zA-Z0-9_-]+)/
      ];

      for (const pattern of patterns) {
        const match = value.match(pattern);

        if (match && match[1]) {
          return "https://lh3.googleusercontent.com/d/" + match[1] + "=w1200";
        }
      }

      return value;
    }

    function getImages(item) {
      let images = [];

      if (Array.isArray(item.images)) {
        images = item.images;
      } else if (Array.isArray(item.imageUrls)) {
        images = item.imageUrls;
      } else {
        images = [
          item.image1,
          item.image2,
          item.image3,
          item.image4,
          item.image5,
          item["画像1URL"],
          item["画像2URL"],
          item["画像3URL"],
          item["画像4URL"],
          item["画像5URL"]
        ];
      }

      return images
        .filter(Boolean)
        .map(convertImageUrl)
        .filter(Boolean);
    }

    function statusClass(status) {
      if (status === "公開") return "public";
      if (status === "非公開") return "private";
      return "pending";
    }

    function renderStars(value) {
      const count = Math.max(
        0,
        Math.min(5, Number(value) || 0)
      );

      return "★".repeat(count) + "☆".repeat(5 - count);
    }

    function addText(parent, tag, className, text) {
      const element = document.createElement(tag);

      if (className) {
        element.className = className;
      }

      element.textContent = text || "";
      parent.appendChild(element);

      return element;
    }

    function addPhotos(parent, images) {
      if (!images.length) return;

      const box = document.createElement("div");
      box.className = "photo-grid";

      images.forEach(url => {
        const image = document.createElement("img");
        image.src = url;
        image.alt = "投稿写真";
        image.loading = "lazy";
        image.onerror = () => {
          image.style.display = "none";
        };
        box.appendChild(image);
      });

      parent.appendChild(box);
    }

    async function loadNews() {
      newsLoading.style.display = "block";
      newsEmpty.style.display = "none";
      newsList.innerHTML = "";

      try {
        const json = await getJson("admin");
        const items = normalizeItems(json);

        newsLoading.style.display = "none";

        if (!items.length) {
          newsEmpty.style.display = "block";
          return;
        }

        items.forEach(item => {
          const card = document.createElement("article");
          card.className = "card";

          const status = getStatus(item);
          const rowNumber = getRowNumber(item);

          addText(
            card,
            "span",
            "status " + statusClass(status),
            status
          );

          addText(
            card,
            "div",
            "meta",
            getValue(item, ["date", "日付"]) || ""
          );

          addText(
            card,
            "h3",
            "",
            getValue(item, ["title", "タイトル"]) || ""
          );

          addText(
            card,
            "p",
            "",
            getValue(item, ["body", "本文"]) || ""
          );

          const imageUrl = convertImageUrl(
            getValue(item, ["imageUrl", "画像URL"])
          );

          if (imageUrl) {
            addPhotos(card, [imageUrl]);
          }

          const externalLink = getValue(
            item,
            ["externalLink", "外部リンク"]
          );

          if (externalLink) {
            const link = document.createElement("a");
            link.className = "small-link";
            link.href = externalLink;
            link.target = "_blank";
            link.rel = "noopener";
            link.textContent = "リンクを確認する";
            card.appendChild(link);
          }

          if (status !== "公開" && rowNumber > 0) {
            const button = document.createElement("button");
            button.className = "success-button";
            button.type = "button";
            button.textContent = "この記事を公開する";

            button.addEventListener("click", () => {
              publishNews(rowNumber, button);
            });

            card.appendChild(button);
          }

          newsList.appendChild(card);
        });
      } catch (error) {
        console.error(error);
        newsLoading.style.display = "none";
        newsEmpty.style.display = "block";
        newsEmpty.textContent =
          "お知らせの読み込みに失敗しました。";
      }
    }

    async function publishNews(rowNumber, button) {
      if (!confirm("このお知らせを公開しますか？")) {
        return;
      }

      button.disabled = true;
      button.textContent = "公開中です…";

      try {
        const result = await postJson({
          mode: "publishNews",
          rowNumber,
          status: "公開",
          publicStatus: "公開",
          "公開": "公開"
        });

        if (result.ok === false || result.error) {
          throw new Error(result.error || "公開に失敗しました。");
        }

        alert("お知らせを公開しました。");
        loadNews();
      } catch (error) {
        console.error(error);
        alert("公開に失敗しました。");
        button.disabled = false;
        button.textContent = "この記事を公開する";
      }
    }

    async function loadVoices() {
      voiceLoading.style.display = "block";
      voiceEmpty.style.display = "none";
      voiceList.innerHTML = "";

      try {
        const json = await getJson("voiceAdmin");
        const allItems = normalizeItems(json);

        const items = allItems.filter(item => {
          return getStatus(item) !== "公開";
        });

        voiceLoading.style.display = "none";

        if (!items.length) {
          voiceEmpty.style.display = "block";
          return;
        }

        items.forEach(item => {
          const card = document.createElement("article");
          card.className = "card";

          const rowNumber = getRowNumber(item);
          const status = getStatus(item);

          addText(
            card,
            "span",
            "status " + statusClass(status),
            status
          );

          addText(
            card,
            "div",
            "meta",
            getValue(item, ["date", "日付", "投稿日"]) || ""
          );

          addText(
            card,
            "h3",
            "",
            getValue(item, ["name", "お名前", "名前"]) || "匿名"
          );

          addText(
            card,
            "div",
            "stars",
            renderStars(
              getValue(item, ["stars", "星", "星評価"])
            )
          );

          addText(
            card,
            "p",
            "",
            getValue(item, ["body", "本文", "コメント"]) || ""
          );

          addPhotos(card, getImages(item));

          if (rowNumber > 0) {
            const button = document.createElement("button");
            button.className = "success-button";
            button.type = "button";
            button.textContent = "このお客様の声を公開する";

            button.addEventListener("click", () => {
              publishVoice(rowNumber, button);
            });

            card.appendChild(button);
          }

          voiceList.appendChild(card);
        });
      } catch (error) {
        console.error(error);
        voiceLoading.style.display = "none";
        voiceEmpty.style.display = "block";
        voiceEmpty.textContent =
          "お客様の声の読み込みに失敗しました。";
      }
    }

    async function publishVoice(rowNumber, button) {
      if (!confirm("このお客様の声を公開しますか？")) {
        return;
      }

      button.disabled = true;
      button.textContent = "公開中です…";

      try {
        const result = await postJson({
          mode: "publishVoice",
          rowNumber,
          status: "公開",
          publicStatus: "公開",
          "公開": "公開"
        });

        if (result.ok === false || result.error) {
          throw new Error(result.error || "公開に失敗しました。");
        }

        alert("お客様の声を公開しました。");
        loadVoices();
      } catch (error) {
        console.error(error);
        alert("公開に失敗しました。");
        button.disabled = false;
        button.textContent = "このお客様の声を公開する";
      }
    }

    newsForm.addEventListener("submit", async event => {
      event.preventDefault();
      clearMessage(newsMessage);

      const date = document.getElementById("newsDate").value;
      const title = document.getElementById("newsTitle").value.trim();
      const body = document.getElementById("newsBody").value.trim();
      const imageUrl = document.getElementById("newsImageUrl").value.trim();
      const externalLink =
        document.getElementById("newsExternalLink").value.trim();
      const publicStatus =
        document.getElementById("newsStatus").value;

      if (!date || !title || !body) {
        showMessage(
          newsMessage,
          "日付・タイトル・本文を入力してください。",
          "error"
        );
        return;
      }

      newsSubmit.disabled = true;
      newsSubmit.textContent = "保存中です…";

      try {
        const result = await postJson({
          mode: "saveNews",
          date,
          title,
          body,
          imageUrl,
          externalLink,
          publicStatus,
          status: publicStatus,
          "公開": publicStatus
        });

        if (result.ok === false || result.error) {
          throw new Error(result.error || "保存に失敗しました。");
        }

        showMessage(
          newsMessage,
          "お知らせを保存しました。",
          "success"
        );

        newsForm.reset();
        loadNews();
      } catch (error) {
        console.error(error);
        showMessage(
          newsMessage,
          "保存に失敗しました。",
          "error"
        );
      } finally {
        newsSubmit.disabled = false;
        newsSubmit.textContent = "お知らせを保存する";
      }
    });

    document.getElementById("newsRefresh").addEventListener(
      "click",
      loadNews
    );

    document.getElementById("voiceRefresh").addEventListener(
      "click",
      loadVoices
    );

    loadNews();
    loadVoices();
  </script>
</body>
</html>
