<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>お知らせ管理｜ろびんショップDX</title>
  <meta name="robots" content="noindex,nofollow">

  <style>
    :root {
      --red: #b51f2a;
      --dark-red: #7d1018;
      --yellow: #f4c400;
      --charcoal: #202124;
      --cream: #fffaf0;
      --gray: #666;
      --line: #eadfca;
      --green: #237a45;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      color: var(--charcoal);
      background: var(--cream);
      font-family:
        -apple-system,
        BlinkMacSystemFont,
        "Hiragino Kaku Gothic ProN",
        "Yu Gothic",
        "Meiryo",
        sans-serif;
      line-height: 1.7;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    header {
      color: #fff;
      background: var(--charcoal);
    }

    .header-inner {
      max-width: 960px;
      margin: 0 auto;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .brand {
      font-size: 1.15rem;
      font-weight: 900;
    }

    .back-link {
      padding: 8px 14px;
      border-radius: 999px;
      background: var(--red);
      font-size: 0.9rem;
      font-weight: 700;
    }

    main {
      max-width: 960px;
      margin: 0 auto;
      padding: 42px 20px 70px;
    }

    .page-title {
      margin: 0 0 8px;
      color: var(--dark-red);
      font-size: clamp(1.8rem, 5vw, 2.6rem);
      text-align: center;
    }

    .lead {
      margin: 0 0 30px;
      color: var(--gray);
      text-align: center;
    }

    .panel {
      padding: 28px;
      border: 1px solid var(--line);
      border-radius: 20px;
      background: #fff;
      box-shadow: 0 8px 24px rgba(90, 55, 20, 0.08);
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 7px;
      font-weight: 800;
    }

    .required {
      margin-left: 6px;
      color: var(--red);
      font-size: 0.78rem;
    }

    input,
    textarea,
    select {
      width: 100%;
      padding: 13px 14px;
      border: 1px solid #d8cdbb;
      border-radius: 10px;
      color: var(--charcoal);
      background: #fffdf8;
      font: inherit;
      font-size: 16px;
    }

    textarea {
      min-height: 170px;
      resize: vertical;
    }

    input:focus,
    textarea:focus,
    select:focus {
      outline: 3px solid rgba(244, 196, 0, 0.35);
      border-color: var(--yellow);
    }

    .help {
      margin: 6px 0 0;
      color: var(--gray);
      font-size: 0.85rem;
    }

    .button-area {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 28px;
    }

    button,
    .button-link {
      min-height: 48px;
      padding: 12px 22px;
      border: 0;
      border-radius: 999px;
      color: #fff;
      background: var(--red);
      font: inherit;
      font-weight: 800;
      cursor: pointer;
      text-align: center;
    }

    button:hover,
    .button-link:hover {
      background: var(--dark-red);
    }

    button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .button-link.secondary {
      color: var(--charcoal);
      background: #f0e8d8;
    }

    .button-link.secondary:hover {
      background: #e2d5bd;
    }

    .status {
      display: none;
      margin-top: 20px;
      padding: 15px 16px;
      border-radius: 10px;
      font-weight: 700;
    }

    .status.success {
      display: block;
      color: #155b30;
      background: #e8f7ed;
      border: 1px solid #9bd0aa;
    }

    .status.error {
      display: block;
      color: #7d1018;
      background: #fff0f0;
      border: 1px solid #e2a1a1;
    }

    .notice {
      margin-top: 24px;
      padding: 16px;
      border-left: 5px solid var(--yellow);
      background: #fff9dc;
      color: #5b4a00;
      font-size: 0.9rem;
    }

    .preview-box {
      display: none;
      margin-top: 26px;
      padding-top: 24px;
      border-top: 1px solid var(--line);
    }

    .preview-box.show {
      display: block;
    }

    .preview-title {
      margin: 0 0 12px;
      color: var(--dark-red);
      font-size: 1.1rem;
    }

    .preview-image {
      width: 100%;
      max-height: 300px;
      object-fit: cover;
      border-radius: 12px;
      background: #f3eee3;
    }

    footer {
      padding: 28px 20px;
      color: #fff;
      background: var(--charcoal);
      text-align: center;
    }

    footer p {
      margin: 4px 0;
    }

    @media (max-width: 640px) {
      .header-inner {
        align-items: flex-start;
        flex-direction: column;
      }

      main {
        padding: 32px 14px 54px;
      }

      .panel {
        padding: 20px 16px;
      }

      .button-area {
        flex-direction: column;
      }

      button,
      .button-link {
        width: 100%;
      }
    }
  </style>
</head>

<body>

  <header>
    <div class="header-inner">
      <div class="brand">ろびんショップDX｜管理画面</div>
      <a class="back-link" href="news.html">お知らせを見る</a>
    </div>
  </header>

  <main>
    <h1 class="page-title">お知らせを登録</h1>

    <p class="lead">
      店舗からのお知らせを入力して公開できます。
    </p>

    <section class="panel">
      <form id="news-form">

        <div class="form-group">
          <label for="date">
            日付
          </label>

          <input
            id="date"
            name="date"
            type="date"
          >
        </div>

        <div class="form-group">
          <label for="title">
            タイトル<span class="required">必須</span>
          </label>

          <input
            id="title"
            name="title"
            type="text"
            placeholder="例：夏季休業のお知らせ"
            required
          >
        </div>

        <div class="form-group">
          <label for="body">
            本文
          </label>

          <textarea
            id="body"
            name="body"
            placeholder="お知らせの内容を入力してください。"
          ></textarea>
        </div>

        <div class="form-group">
          <label for="imageUrl">
            画像URL
          </label>

          <input
            id="imageUrl"
            name="imageUrl"
            type="url"
            placeholder="https://..."
          >

          <p class="help">
            GitHub、Google Drive、画像公開URLなどを入力できます。
          </p>
        </div>

        <div class="form-group">
          <label for="externalLink">
            外部リンク
          </label>

          <input
            id="externalLink"
            name="externalLink"
            type="url"
            placeholder="YouTube、Googleマップ、公式ページなど"
          >

          <p class="help">
            YouTube、Googleマップ、Instagramなどのリンクを設定できます。
          </p>
        </div>

        <div class="form-group">
          <label for="publish">
            公開状態
          </label>

          <select id="publish" name="publish">
            <option value="公開">公開する</option>
            <option value="非公開">非公開にする</option>
          </select>
        </div>

        <div class="button-area">
          <button id="submit-button" type="submit">
            お知らせを登録する
          </button>

          <a class="button-link secondary" href="news.html">
            お知らせページを確認
          </a>
        </div>

        <div id="status" class="status"></div>

        <div class="notice">
          入力した内容は「お知らせ」シートに保存されます。
          公開状態を「公開する」にすると、お知らせページに表示されます。
        </div>

        <div id="preview-box" class="preview-box">
          <h2 class="preview-title">画像プレビュー</h2>
          <img
            id="preview-image"
            class="preview-image"
            alt="画像プレビュー"
          >
        </div>

      </form>
    </section>
  </main>

  <footer>
    <p>ろびんショップDX</p>
    <p>管理者用お知らせ登録画面</p>
  </footer>

  <script>
    const GAS_URL =
      "https://script.google.com/macros/s/AKfycbxHyaWGMgx1Z_pj6aDBkWbWKcYZ8-Om-pxXxHH5C1lOvbJ2CP_uarqbjeiJYEorlv0Stg/exec";

    const form =
      document.getElementById("news-form");

    const dateInput =
      document.getElementById("date");

    const titleInput =
      document.getElementById("title");

    const bodyInput =
      document.getElementById("body");

    const imageInput =
      document.getElementById("imageUrl");

    const linkInput =
      document.getElementById("externalLink");

    const publishInput =
      document.getElementById("publish");

    const submitButton =
      document.getElementById("submit-button");

    const statusBox =
      document.getElementById("status");

    const previewBox =
      document.getElementById("preview-box");

    const previewImage =
      document.getElementById("preview-image");

    function getToday() {
      const now = new Date();

      const year =
        now.getFullYear();

      const month =
        String(now.getMonth() + 1)
          .padStart(2, "0");

      const day =
        String(now.getDate())
          .padStart(2, "0");

      return year + "-" + month + "-" + day;
    }

    function showStatus(message, type) {
      statusBox.textContent = message;
      statusBox.className = "status " + type;
    }

    function clearStatus() {
      statusBox.textContent = "";
      statusBox.className = "status";
    }

    function updatePreview() {
      const imageUrl =
        imageInput.value.trim();

      if (!imageUrl) {
        previewBox.classList.remove("show");
        previewImage.removeAttribute("src");
        return;
      }

      previewImage.src = imageUrl;
      previewBox.classList.add("show");
    }

    function readResponse(responseText) {
      try {
        return JSON.parse(responseText);
      } catch (error) {
        throw new Error(
          "GASから正しい返答を受け取れませんでした。"
        );
      }
    }

    async function saveNews(event) {
      event.preventDefault();

      clearStatus();

      const title =
        titleInput.value.trim();

      if (!title) {
        showStatus(
          "タイトルを入力してください。",
          "error"
        );
        return;
      }

      const payload = {
        mode: "saveNews",

        date:
          dateInput.value || getToday(),

        title: title,

        body:
          bodyInput.value.trim(),

        imageUrl:
          imageInput.value.trim(),

        image:
          imageInput.value.trim(),

        externalLink:
          linkInput.value.trim(),

        link:
          linkInput.value.trim(),

        publish:
          publishInput.value
      };

      submitButton.disabled = true;
      submitButton.textContent = "登録中です…";

      try {
        const response =
          await fetch(
            GAS_URL + "?mode=saveNews",
            {
              method: "POST",
              headers: {
                "Content-Type":
                  "text/plain;charset=utf-8"
              },
              body: JSON.stringify(payload)
            }
          );

        const responseText =
          await response.text();

        const result =
          readResponse(responseText);

        if (!result.ok) {
          throw new Error(
            result.error ||
            "お知らせの登録に失敗しました。"
          );
        }

        showStatus(
          "お知らせを登録しました。お知らせページで確認できます。",
          "success"
        );

        titleInput.value = "";
        bodyInput.value = "";
        imageInput.value = "";
        linkInput.value = "";
        publishInput.value = "公開";
        dateInput.value = getToday();

        previewBox.classList.remove("show");
        previewImage.removeAttribute("src");

      } catch (error) {
        console.error(error);

        showStatus(
          error.message ||
          "登録できませんでした。",
          "error"
        );
      } finally {
        submitButton.disabled = false;
        submitButton.textContent = "お知らせを登録する";
      }
    }

    dateInput.value = getToday();

    imageInput.addEventListener(
      "input",
      updatePreview
    );

    form.addEventListener(
      "submit",
      saveNews
    );
  </script>

</body>
</html>
